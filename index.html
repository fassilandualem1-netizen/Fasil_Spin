<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP PRO - High Definition</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --red: #ff3333; }
        body { font-family: sans-serif; background: #000; color: var(--gold); text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Security Screen */
        #lockScreen { position: fixed; inset: 0; background: #000; z-index: 200000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .lock-box { background: #111; padding: 30px; border: 2px solid var(--gold); border-radius: 20px; width: 85%; }

        /* --- LIVE TRACKING BAR (Returned) --- */
        .live-status-bar { display: flex; align-items: center; justify-content: center; background: #111; padding: 8px 18px; border-radius: 50px; border: 1px solid #333; width: fit-content; margin: 40px auto 10px auto; }
        .blink-dot { width: 10px; height: 10px; background-color: var(--red); border-radius: 50%; margin-right: 10px; box-shadow: 0 0 8px var(--red); animation: live-blink 1s infinite; }
        @keyframes live-blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* --- BIG SINGLE NUMBER DISPLAY --- */
        #focusWinnerDisplay { height: 130px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 10px; }
        .focus-num { font-size: 110px; font-weight: 900; color: #fff; text-shadow: 0 0 30px var(--gold); line-height: 1; transition: all 0.3s ease; }

        #appContent { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .page { display: none; flex: 1; padding: 10px; overflow-y: auto; box-sizing: border-box; padding-bottom: 90px; }
        .page.active { display: flex; flex-direction: column; }
        
        /* Grid & Styling */
        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2.5px; background: #151515; padding: 5px; border-radius: 8px; width: 100%; margin: 5px 0; }
        .grid-cell { background: #0a0a0a; font-size: 10px; font-weight: bold; padding: 6px 0; border: 1px solid #222; border-radius: 3px; }
        .booked { border: 1px solid #fff !important; background: #333 !important; }
        .winner-hit { background: var(--red) !important; color: #fff !important; animation: winner-pulse 0.8s infinite; }
        @keyframes winner-pulse { 50% { transform: scale(1.2); } }
        
        canvas { border: 4px solid var(--gold); border-radius: 50%; background: #050505; width: 130px; height: 130px; margin: 10px auto; }
        button#drawBtn { width: 95%; padding: 16px; border-radius: 15px; font-size: 20px; font-weight: bold; background: var(--gold); color: #000; border: none; margin: 5px auto; box-shadow: 0 5px 15px rgba(191,149,63,0.4); }
        
        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 75px; z-index: 1000; } 
        .tab-btn { flex: 1; color: #777; border: none; background: none; font-weight: bold; font-size: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #1a1a1a; }
        .setup-input { width: 90%; padding: 12px; margin: 10px auto; border-radius: 8px; border: 1px solid var(--gold); background: #111; color: #fff; text-align: center; }
    </style>
</head>
<body onload="checkLicense()">

    <div id="lockScreen">
        <div class="lock-box">
            <h2>FASIL VIP PRO</h2>
            <div id="myDeviceId" style="color: #fff; margin: 10px; font-family: monospace; font-size: 18px;">---</div>
            <input type="text" id="licenseKey" style="width:80%; padding:12px; text-align:center; border-radius:8px; border:1px solid var(--gold); background:#000; color:#fff;" placeholder="ቁልፍ ያስገቡ">
            <br><br>
            <button onclick="validateKey()" style="background:var(--gold); padding:15px; width:80%; border:none; border-radius:10px; font-weight:bold;">ACTIVATE</button>
        </div>
    </div>

    <div id="appContent">
        <div id="bookingPage" class="page">
            <h3>📋 መዝገብ</h3>
            <div id="bookingGrid" class="grid-container"></div>
            <button onclick="clearBookingOnly()" style="color:red; background:none; border:1px solid #444; padding:10px; border-radius:10px; margin-top:10px;">መዝገብ አፅዳ</button>
        </div>
        
        <div id="gamePage" class="page active">
            <div class="live-status-bar">
                <div class="blink-dot"></div>
                <span style="color: #ff3333; font-weight: bold; font-size: 13px; margin-right: 10px;">LIVE TRACKING</span>
                <span id="liveClock" style="color: #fff; font-family: monospace;">00:00:00</span>
            </div>

            <div id="focusWinnerDisplay">
                <div class="focus-num" id="currentResult">--</div>
            </div>

            <div id="gameGrid" class="grid-container"></div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            
            <button id="drawBtn" onclick="runSequence()">START DRAW</button>
            <button id="resetBtn" onclick="location.reload()" style="display:none; background:#111; color:#fff; padding:15px; border-radius:15px; width:95%; margin:10px auto; border:1px solid var(--gold);">እንደገና ጀምር</button>
        </div>

        <div id="historyPage" class="page"><h3>🕒 የታሪክ ማህደር</h3><div id="historyList"></div></div>
        <div id="setupPage" class="page"><h3>⚙️ SETUP</h3><input type="text" id="botTokenInput" class="setup-input" placeholder="Bot Token"><input type="text" id="chatIdInput" class="setup-input" placeholder="Chat ID"><button style="background:var(--gold); color:#000; padding:15px; width:90%; border-radius:10px; font-weight:bold; border:none;" onclick="saveSettings()">SAVE SETTINGS</button></div>
        
        <div id="navTabs" class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">📋 መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">🕒 ታሪክ</button>
            <button class="tab-btn" onclick="showPage('setupPage', this)">⚙️ SETUP</button>
        </div>
    </div>

    <script>
        const DEFAULT_BOT_TOKEN = "8757888085:AAG2Gpgdyu_R_TOEtt3f_JU0F-xjmCnSPgc";
        const rowColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"];
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let liveMsgId = null;
        const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d');

        function playSound(f, t, d) { try { if(audioCtx.state==='suspended') audioCtx.resume(); let o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=t; o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(0.5, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); } catch(e){} }
        const snds = { spin:()=>playSound(Math.random()*300+400,'triangle',0.05), win:()=>playSound(523,'square',0.5), beep:()=>playSound(800,'sine',0.2) };

        function checkLicense() {
            let uid = localStorage.getItem('f_uid') || "FS-" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('f_uid', uid); document.getElementById('myDeviceId').innerText = uid;
            let firstSeen = localStorage.getItem('f_first_seen');
            if (!firstSeen) { firstSeen = Date.now(); localStorage.setItem('f_first_seen', firstSeen); }
            const savedKey = localStorage.getItem('f_license'), expectedKey = (parseInt(uid.split('-')[1]) + 1000).toString(), masterKey = "9988";
            const trialLimit = 5 * 24 * 60 * 60 * 1000, timePassed = Date.now() - parseInt(firstSeen);
            if (savedKey === masterKey || savedKey === expectedKey || timePassed < trialLimit) { openApp(); } 
            else { document.getElementById('lockScreen').style.display = 'flex'; }
        }

        function validateKey() {
            let k = document.getElementById('licenseKey').value.trim(), uid = localStorage.getItem('f_uid'), expected = (parseInt(uid.split('-')[1]) + 1000).toString();
            if (k === "9988" || k === expected) { localStorage.setItem('f_license', k); location.reload(); } else { alert("ስህተት!"); }
        }

        function openApp() {
            document.getElementById('appContent').style.display = 'flex';
            document.getElementById('chatIdInput').value = localStorage.getItem('f_chat_id') || "";
            document.getElementById('botTokenInput').value = localStorage.getItem('f_bot_token') || "";
            setup(); renderBall("?", false);
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        }

        async function runSequence() {
            if(!localStorage.getItem('f_chat_id')) return alert("Chat ID ያስገቡ!");
            document.getElementById('drawBtn').style.display = 'none';
            initTelegramLive().catch(e=>console.log("Bot Error"));
            startLiveDraw();
        }

        async function startLiveDraw() {
            let all = Array.from({length: 100}, (_, i) => i + 1);
            for(let i=all.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [all[i], all[j]]=[all[j], all[i]]; }
            let winners = [all[0], all[1], all[2]];

            for(let i=1; i<=3; i++) {
                let win = winners[i-1];
                document.getElementById('currentResult').style.color = "#777";
                
                for(let j=0; j<60; j++) { 
                    snds.spin(); 
                    let rand = Math.floor(Math.random()*100)+1;
                    renderBall(rand, false); 
                    document.getElementById('currentResult').innerText = rand;
                    await new Promise(r=>setTimeout(r, 70)); 
                }
                
                snds.win();
                renderBall(win, true);
                document.getElementById('currentResult').innerText = win; 
                document.getElementById('currentResult').style.color = "#fff";
                document.getElementById('g'+win).classList.add('winner-hit');
                
                updateTelegramLive(i, win).catch(e=>console.log("Tele Error"));
                await new Promise(r=>setTimeout(r, 3000));
            }
            finalTelegramPost(winners).catch(e=>console.log("Final Error"));
            saveHist(winners); 
            document.getElementById('resetBtn').style.display = 'block';
        }

        async function initTelegramLive() {
            const t = localStorage.getItem('f_bot_token') || DEFAULT_BOT_TOKEN, c = localStorage.getItem('f_chat_id');
            const m = `✨ **FASIL VIP PRO BINGO** ✨\n\n📢 **ዕጣው ተጀምሯል...**\n━━━━━━━━━━━━━━━━━━━━`;
            let res = await fetch(`https://api.telegram.org/bot${t}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:c, text:m, parse_mode:'Markdown'}) });
            let d = await res.json(); if(d.ok) liveMsgId = d.result.message_id;
        }

        async function updateTelegramLive(step, num) {
            if(!liveMsgId) return;
            const t = localStorage.getItem('f_bot_token') || DEFAULT_BOT_TOKEN, c = localStorage.getItem('f_chat_id');
            let txt = `✨ **FASIL VIP PRO BINGO** ✨\n\n🎯 **ቁጥር ${num} ወጥቷል!**\n━━━━━━━━━━━━━━━━━━━━\n_ለሚቀጥለው ዕጣ ይዘጋጁ..._`;
            await fetch(`https://api.telegram.org/bot${t}/editMessageText`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:c, message_id:liveMsgId, text:txt, parse_mode:'Markdown'}) });
        }

        async function finalTelegramPost(w) {
            if(!liveMsgId) return;
            const t = localStorage.getItem('f_bot_token') || DEFAULT_BOT_TOKEN, c = localStorage.getItem('f_chat_id');
            const n = w.map(num => localStorage.getItem('bk_'+num) || "ያልተመዘገበ");
            const m = `🔥🔥 **የዕጣው ማጠቃለያ** 🔥🔥\n\n🏆 **${w[0]}** — (${n[0]})\n🏆 **${w[1]}** — (${n[1]})\n🏆 **${w[2]}** — (${n[2]})\n━━━━━━━━━━━━━━━━━━━━\n🎊 **እንኳን ደስ አላችሁ!**\n🚀 **POWERED BY FASIL VIP PRO**`;
            await fetch(`https://api.telegram.org/bot${t}/editMessageText`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:c, message_id:liveMsgId, text:m, parse_mode:'Markdown'}) });
        }

        function setup() {
            const bg=document.getElementById('bookingGrid'), gg=document.getElementById('gameGrid'); bg.innerHTML=""; gg.innerHTML="";
            for(let i=1; i<=100; i++){
                let clr = rowColors[Math.floor((i-1)/10)], bc=document.createElement('div'); bc.className='grid-cell'; bc.innerText=i;
                if(localStorage.getItem('bk_'+i)) bc.classList.add('booked');
                bc.onclick=()=>{ let v=prompt(i+" ስም:", localStorage.getItem('bk_'+i)||""); if(v!==null){ v.trim()===""?localStorage.removeItem('bk_'+i):localStorage.setItem('bk_'+i,v); setup(); } };
                bg.appendChild(bc); let gc=document.createElement('div'); gc.className='grid-cell'; gc.id='g'+i; gc.innerText=i; gc.style.color=clr; gc.style.borderColor=clr; gg.appendChild(gc);
            }
        }
        function renderBall(v, f) {
            cx.clearRect(0,0,200,200); let clr = (f && v>0)?rowColors[Math.floor((v-1)/10)]:'#bf953f';
            let g=cx.createRadialGradient(70,70,10,100,100,80); g.addColorStop(0,'#fcf6ba'); g.addColorStop(1, clr);
            cx.beginPath(); cx.arc(100,100,85,0,Math.PI*2); cx.fillStyle=g; cx.fill();
            cx.fillStyle="#000"; cx.font="bold 75px Arial"; cx.textAlign="center"; cx.fillText(v||"?",100,125);
        }
        function saveSettings() { localStorage.setItem('f_chat_id', document.getElementById('chatIdInput').value.trim()); localStorage.setItem('f_bot_token', document.getElementById('botTokenInput').value.trim()); alert("Saved!"); }
        function showPage(p, b) { document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active')); document.getElementById(p).classList.add('active'); b.classList.add('active'); if(p==='historyPage') loadHistory(); }
        function saveHist(w) { let h=JSON.parse(localStorage.getItem('f_h')||"[]"); h.unshift({t:new Date().toLocaleTimeString(), r:w}); localStorage.setItem('f_h', JSON.stringify(h.slice(0,20))); }
        function loadHistory() { let h=JSON.parse(localStorage.getItem('f_h')||"[]"); document.getElementById('historyList').innerHTML = h.map(x=>`<div style="background:#111; padding:10px; margin:5px; border-radius:10px; border:1px solid #333;"><small>${x.t}</small><br><b>${x.r.join(' - ')}</b></div>`).join(''); }
        function clearBookingOnly() { if(confirm("መዝገብ ላጥፋ?")){ for(let i=1; i<=100; i++) localStorage.removeItem('bk_'+i); setup(); } }
    </script>
</body>
</html>
