<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP ULTIMATE</title>
    <style>
        :root { --gold: #D4AF37; --bright-gold: #FFD700; --dark-bg: #050505; --card-bg: #121212; --red: #FF4B2B; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--dark-bg); color: var(--gold); text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Glassmorphism Effect */
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.3); }

        #lockScreen { position: fixed; inset: 0; background: var(--dark-bg); z-index: 200000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .lock-box { background: var(--card-bg); padding: 40px 20px; border: 2px solid var(--gold); border-radius: 30px; width: 80%; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .lock-input { width: 80%; padding: 15px; margin: 20px 0; background: #000; border: 1px solid var(--gold); color: #fff; text-align: center; font-size: 32px; border-radius: 15px; letter-spacing: 10px; outline: none; }

        #appContent { flex: 1; display: none; flex-direction: column; overflow: hidden; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .page { display: none; flex: 1; padding: 15px; overflow-y: auto; box-sizing: border-box; padding-bottom: 100px; }
        .page.active { display: flex; flex-direction: column; }

        .tabs { display: flex; background: #0a0a0a; border-top: 1px solid #222; position: fixed; bottom: 0; width: 100%; height: 80px; z-index: 1000; } 
        .tab-btn { flex: 1; color: #555; border: none; background: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .tab-btn.active { color: var(--bright-gold); background: rgba(212, 175, 55, 0.05); border-top: 3px solid var(--gold); }

        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #000; padding: 10px; border-radius: 15px; border: 1px solid #222; }
        .grid-cell { background: #111; font-size: 11px; font-weight: bold; padding: 8px 0; border: 1px solid #222; border-radius: 5px; transition: 0.2s; }
        .booked { border: 1px solid #fff !important; background: #333 !important; color: #fff; }
        .winner-hit { background: var(--gold) !important; color: #000 !important; transform: scale(1.2); z-index: 10; box-shadow: 0 0 15px var(--gold); }

        .res-row { display: flex; justify-content: space-between; margin: 15px 0; }
        .res-card { background: var(--card-bg); border: 1px solid var(--gold); padding: 10px; border-radius: 15px; width: 30%; position: relative; overflow: hidden; }
        .res-card span { font-size: 10px; color: #888; text-transform: uppercase; }
        .res-card b { font-size: 30px; color: #fff; display: block; margin-top: 5px; }

        canvas { border: 5px solid var(--gold); border-radius: 50%; background: radial-gradient(circle, #111, #000); width: 140px; height: 140px; margin: 10px auto; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        
        button#drawBtn { width: 100%; padding: 18px; border-radius: 20px; font-size: 20px; font-weight: bold; background: linear-gradient(135deg, var(--gold), var(--bright-gold)); color: #000; border: none; margin: 10px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.4); cursor: pointer; }
        
        #statusOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100002; display: none; justify-content: center; align-items: center; font-size: 60px; font-weight: 900; letter-spacing: 5px; color: var(--bright-gold); }
    </style>
</head>
<body onload="checkAccess()">

    <div id="lockScreen">
        <div class="lock-box">
            <h1 style="margin:0; letter-spacing:3px;">FASIL VIP</h1>
            <p style="color:var(--red); font-size:14px;">PREMIUM ACCESS REQUIRED</p>
            <input type="password" id="passCode" class="lock-input" placeholder="••••" maxlength="4">
            <button onclick="unlockApp()" style="background:var(--gold); border:none; padding:18px; width:85%; border-radius:15px; font-weight:bold; font-size:18px;">ACTIVATE</button>
        </div>
    </div>

    <div id="statusOverlay">READY</div>

    <div id="appContent">
        <div id="bookingPage" class="page">
            <h2 style="margin-top:40px;">📋 የመዝገብ ዝርዝር</h2>
            <div id="bookingGrid" class="grid-container"></div>
            <button style="color:var(--red); border:1px solid var(--red); background:none; padding:12px 30px; border-radius:30px; margin-top:20px; font-weight:bold;" onclick="clearBookingOnly()">አፅዳ</button>
        </div>
        
        <div id="gamePage" class="page active">
            <div style="margin-top:40px; background:#111; padding:10px; border-radius:50px; display:inline-flex; align-items:center; gap:10px; align-self:center; border:1px solid #222;">
                <div style="width:10px; height:10px; background:red; border-radius:50%; animation:blink 1s infinite;"></div>
                <span id="liveClock" style="font-weight:bold; font-family:monospace; color:#fff;">00:00:00</span>
            </div>
            
            <div id="gameGrid" class="grid-container" style="margin:15px 0;"></div>
            
            <div class="res-row">
                <div class="res-card"><span>1ኛ ዕጣ</span><b id="v1">?</b></div>
                <div class="res-card"><span>2ኛ ዕጣ</span><b id="v2">?</b></div>
                <div class="res-card"><span>3ኛ ዕጣ</span><b id="v3">?</b></div>
            </div>
            
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <button id="drawBtn" onclick="runSequence()">START DRAW</button>
            <button id="resetBtn" onclick="location.reload()" style="display:none; background:#222; color:#fff; padding:15px; border-radius:20px; border:1px solid #444; width:100%; font-weight:bold;">RE-START GAME</button>
        </div>

        <div id="historyPage" class="page">
            <h2 style="margin-top:40px;">🕒 የዕጣ ታሪክ</h2>
            <div id="historyList"></div>
        </div>

        <div id="setupPage" class="page">
            <h2 style="margin-top:40px;">⚙️ SETTINGS</h2>
            <div class="glass" style="padding:20px; border-radius:20px; text-align:left;">
                <label style="font-size:12px; color:#888;">TELEGRAM CHAT ID</label>
                <input type="text" id="chatIdInput" class="setup-input" placeholder="-100XXXXXXXXX" style="margin:10px 0;">
                <button class="save-btn" onclick="saveSettings()">SAVE SETTINGS</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)"><span>📋</span><br>መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)"><span>🎰</span><br>ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)"><span>🕒</span><br>ታሪክ</button>
            <button class="tab-btn" onclick="showPage('setupPage', this)"><span>⚙️</span><br>SETUP</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8106733230:AAEmw1-x616Xn_rG5L6YyI4pM7-7K4V5uYQ";
        const MASTER_KEY = "9988";
        const rowColors = ["#FF3E3E", "#4CAF50", "#2196F3", "#E91E63", "#FF9800", "#00BCD4", "#FFEB3B", "#9C27B0", "#00FF7F", "#FF5722"];
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, dur, vol) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.value = freq; g.gain.value = vol;
                o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
                o.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        function checkAccess() {
            let start = localStorage.getItem('f_start') || Date.now();
            if (!localStorage.getItem('f_start')) localStorage.setItem('f_start', start);
            let days = Math.floor((Date.now() - start) / 86400000);
            if (localStorage.getItem('f_ok') === '1' || days < 5) {
                document.getElementById('appContent').style.display = 'flex';
            } else {
                document.getElementById('lockScreen').style.display = 'flex';
            }
            document.getElementById('chatIdInput').value = localStorage.getItem('f_chat_id') || "";
            setup();
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        }

        function unlockApp() {
            if(document.getElementById('passCode').value === MASTER_KEY) {
                localStorage.setItem('f_ok', '1'); location.reload();
            } else alert("INVALID CODE");
        }

        function saveSettings() {
            localStorage.setItem('f_chat_id', document.getElementById('chatIdInput').value.trim());
            alert("SETTINGS SAVED ✅");
            showPage('gamePage', document.querySelectorAll('.tab-btn')[1]);
        }

        function setup() {
            const bg = document.getElementById('bookingGrid'), gg = document.getElementById('gameGrid');
            bg.innerHTML = ""; gg.innerHTML = "";
            for(let i=1; i<=100; i++) {
                let color = rowColors[Math.floor((i-1)/10)];
                let bc = document.createElement('div'); bc.className = 'grid-cell'; bc.innerText = i;
                if(localStorage.getItem('bk_'+i)) bc.classList.add('booked');
                bc.onclick = () => {
                    let v = prompt(i+" - ስም ያስገቡ:", localStorage.getItem('bk_'+i)||"");
                    if(v!==null) { if(v.trim()==="") localStorage.removeItem('bk_'+i); else localStorage.setItem('bk_'+i, v); setup(); }
                }; bg.appendChild(bc);
                let gc = document.createElement('div'); gc.className = 'grid-cell'; gc.id = 'g'+i; gc.innerText = i; 
                gc.style.color = color; gc.style.borderColor = color + "44"; gg.appendChild(gc);
            }
        }

        function showPage(p, b) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById(p).classList.add('active'); b.classList.add('active');
            if(p==='historyPage') loadHistory();
        }

        const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d');
        function renderBall(val, final) {
            cx.clearRect(0,0,200,200);
            let ballColor = (final && val > 0) ? rowColors[Math.floor((val-1)/10)] : '#222';
            let g = cx.createRadialGradient(70,70,10,100,100,90);
            g.addColorStop(0, final ? '#fff' : '#444'); g.addColorStop(1, ballColor);
            cx.beginPath(); cx.arc(100,100,80,0,Math.PI*2); cx.fillStyle=g; cx.fill();
            cx.shadowBlur = 15; cx.shadowColor = ballColor;
            cx.fillStyle= final ? "#000" : "#fff"; cx.font="bold 80px Arial"; cx.textAlign="center"; cx.fillText(val||"?",100,128);
        }

        async function runSequence() {
            if(!localStorage.getItem('f_chat_id')) { alert("PLEASE SET CHAT ID FIRST!"); return; }
            document.getElementById('drawBtn').style.display = 'none';
            const ov = document.getElementById('statusOverlay'); ov.style.display = 'flex';
            for(let s of ["3","2","1","GO!"]) { 
                ov.innerText = s; playSfx(500, 0.3, 0.1); 
                await new Promise(r=>setTimeout(r,800)); 
            }
            ov.style.display = 'none'; startLiveDraw();
        }

        async function startLiveDraw() {
            let all = []; for(let n=1; n<=100; n++) all.push(n);
            for(let i=all.length-1; i>0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [all[i], all[j]] = [all[j], all[i]];
            }
            let winners = [all[0], all[1], all[2]];
            for(let i=1; i<=3; i++) {
                let win = winners[i-1];
                for(let j=0; j<25; j++) {
                    let t = Math.floor(Math.random()*100)+1; 
                    document.getElementById('g'+t).style.background = "#fff";
                    renderBall(Math.floor(Math.random()*100)+1, false);
                    playSfx(1200, 0.04, 0.05);
                    await new Promise(r=>setTimeout(r, 50));
                    document.getElementById('g'+t).style.background = "#111";
                }
                renderBall(win, true); playSfx(400, 1, 0.3); 
                document.getElementById('v'+i).innerText = win;
                document.getElementById('v'+i).parentElement.style.borderColor = "#fff";
                document.getElementById('g'+win).classList.add('winner-hit');
                await new Promise(r=>setTimeout(r, 1500));
            }
            saveHist(winners); sendToTelegram(winners);
            document.getElementById('resetBtn').style.display = 'block';
        }

        function sendToTelegram(w) {
            const cid = localStorage.getItem('f_chat_id');
            const n = w.map(num => localStorage.getItem('bk_'+num) || "ያልተመዘገበ");
            
            const msg = `━━━━━━━━━━━━━━\n` +
                        `🎰 **ፋሲል VIP ቢንጎ ውጤት** 🎰\n` +
                        `━━━━━━━━━━━━━━\n\n` +
                        `🥇 **1ኛ ዕጣ:** 【 **${w[0]}** 】 \n` +
                        `👤 ስም: _${n[0]}_\n\n` +
                        `🥈 **2ኛ ዕጣ:** 【 **${w[1]}** 】 \n` +
                        `👤 ስም: _${n[1]}_\n\n` +
                        `🥉 **3ኛ ዕጣ:** 【 **${w[2]}** 】 \n` +
                        `👤 ስም: _${n[2]}_\n\n` +
                        `━━━━━━━━━━━━━━\n` +
                        `📅 ${new Date().toLocaleDateString()} | 🕒 ${new Date().toLocaleTimeString()}\n` +
                        `✨ **እንኳን ደስ አላችሁ!** ✨\n` +
                        `━━━━━━━━━━━━━━`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }

        function saveHist(w) {
            let h = JSON.parse(localStorage.getItem('f_h')||"[]");
            h.unshift({t: new Date().toLocaleTimeString(), d: new Date().toLocaleDateString(), r: w});
            localStorage.setItem('f_h', JSON.stringify(h.slice(0,30)));
        }

        function loadHistory() {
            let h = JSON.parse(localStorage.getItem('f_h')||"[]");
            document.getElementById('historyList').innerHTML = h.map(x => {
                let balls = x.r.map((num, idx) => `
                    <div style="text-align:center;">
                        <div style="width:40px; height:40px; border-radius:50%; background:${rowColors[Math.floor((num-1)/10)]}; color:#000; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:18px; box-shadow:0 3px 6px rgba(0,0,0,0.3); border:2px solid #fff;">${num}</div>
                        <span style="font-size:10px; color:#888; display:block; margin-top:5px;">${idx+1}ኛ</span>
                    </div>`).join('');
                return `
                <div class="glass" style="margin:10px 0; padding:15px; border-radius:15px; display:flex; flex-direction:column;">
                    <div style="display:flex; justify-content:space-between; font-size:11px; color:#aaa; margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:5px;">
                        <span>📅 ${x.d}</span><span>🕒 ${x.t}</span>
                    </div>
                    <div style="display:flex; gap:20px; justify-content:center;">${balls}</div>
                </div>`;
            }).join('');
        }

        function clearBookingOnly() {
            if(confirm("ሁሉንም ስሞች ማጥፋት ትፈልጋለህ?")) {
                for(let i=1; i<=100; i++) localStorage.removeItem('bk_'+i);
                setup();
            }
        }
    </script>
</body>
</html>
