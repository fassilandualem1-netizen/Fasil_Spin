<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP PRO - Secured Enterprise</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --red: #ff3333; --dark: #000; }
        html, body { overflow: hidden; height: 100vh; width: 100vw; margin: 0; padding: 0; position: fixed; touch-action: none; background: var(--dark); font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; user-select: none; }
        body { color: var(--gold); text-align: center; display: flex; flex-direction: column; }
        
        /* App Content Styling */
        .top-container { margin-top: 15px; }
        .live-status-bar { display: flex; align-items: center; justify-content: center; background: #111; padding: 4px 12px; border-radius: 50px; border: 1px solid #333; width: fit-content; margin: 0 auto 10px auto; }
        .blink-dot { width: 8px; height: 8px; background-color: var(--red); border-radius: 50%; margin-right: 8px; animation: live-blink 1s infinite; }
        @keyframes live-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        #focusWinnerDisplay { height: 130px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .focus-label { font-size: 26px; font-weight: bold; color: var(--bright-gold); text-shadow: 0 0 10px var(--gold); min-height: 35px; }
        .focus-num { font-size: 90px; font-weight: 900; color: #fff; text-shadow: 0 0 25px var(--gold); line-height: 1; transition: 0.2s; }
        
        #appContent { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .page { display: none; flex: 1; padding: 15px; box-sizing: border-box; overflow: hidden; position: relative; }
        .page.active { display: flex; flex-direction: column; }
        
        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2.5px; background: #151515; padding: 4px; border-radius: 8px; margin: 5px 0; }
        .grid-cell { background: #0a0a0a; font-size: 10px; font-weight: bold; padding: 8px 0; border: 1px solid #222; border-radius: 3px; }
        .booked { border: 1px solid #fff !important; background: #333 !important; }
        .winner-hit { background: var(--red) !important; color: #fff !important; animation: winner-pulse 0.8s infinite; transform: scale(1.1); z-index: 5; }
        
        @keyframes winner-pulse { 50% { transform: scale(1.2); } }
        canvas { border: 4px solid var(--gold); border-radius: 50%; background: #050505; width: 110px; height: 110px; margin: 2px auto; }
        
        button.main-btn { width: 100%; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; background: var(--gold); color: #000; border: none; cursor: pointer; }
        button.main-btn:disabled { background: #444; color: #777; }

        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 75px; } 
        .tab-btn { flex: 1; color: #777; border: none; background: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #1a1a1a; }
        
        #lockScreen { display:none; position:fixed; inset:0; background:#000; z-index:10000; flex-direction:column; justify-content:center; align-items:center; }
        #finalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body onload="checkLicense()">

    <div id="lockScreen">
        <div style="background:#111; padding:30px; border:2px solid var(--gold); border-radius:20px; width:80%;">
            <h2 style="color:var(--gold);">FASIL VIP</h2>
            <p style="color:#bbb; font-size:12px;">የሙከራ ጊዜዎ አብቅቷል! ለመቀጠል የፈቃድ ቁልፍ ያስገቡ።</p>
            <div id="myDeviceId" style="color:#fff; margin:15px 0; font-family:monospace; background:#000; padding:10px; border-radius:5px;">---</div>
            <input type="text" id="licenseKey" style="width:90%; padding:14px; text-align:center; border-radius:8px; background:#000; color:#fff; border:1px solid var(--gold);" placeholder="Activation Key">
            <br><br>
            <button onclick="validateKey()" class="main-btn">ACTIVATE SYSTEM</button>
        </div>
    </div>

    <div id="finalOverlay">
        <div style="background:#111; border:2px solid var(--gold); border-radius:20px; width:85%; padding:25px;">
            <h2 style="color:var(--gold);">🏆 የዕጣው ማጠቃለያ</h2>
            <div id="finalList" style="text-align:left; margin:20px 0;"></div>
            <button class="main-btn" onclick="clearSessionAndReload()">ተጠናቋል</button>
        </div>
    </div>

    <div id="appContent">
        <div id="gamePage" class="page active">
            <div class="top-container">
                <div class="live-status-bar"><div class="blink-dot"></div><span id="liveClock" style="color:#fff; font-family:monospace;">00:00:00</span></div>
                <div id="focusWinnerDisplay">
                    <div class="focus-label" id="levelLabel">READY?</div>
                    <div class="focus-num" id="currentResult">--</div>
                </div>
            </div>
            <div id="gameGrid" class="grid-container"></div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <div style="padding:10px 20px;"><button id="drawBtn" class="main-btn" onclick="runSequence()">START DRAWING</button></div>
        </div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">📋 መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">🕒 ታሪክ</button>
            <button class="tab-btn" onclick="showPage('setupPage', this)">⚙️ SETUP</button>
        </div>

        <div id="bookingPage" class="page"><h3>📋 መዝገብ</h3><div id="bookingGrid" class="grid-container"></div><button onclick="clearBookingOnly()" style="color:red; background:none; border:1px solid #444; padding:10px; border-radius:10px; width:100%;">መዝገብ አፅዳ</button></div>
        <div id="historyPage" class="page"><h3>🕒 ታሪክ</h3><div id="historyList"></div></div>
        <div id="setupPage" class="page">
            <h3>⚙️ SETUP</h3>
            <input type="text" id="botTokenInput" style="width:90%; padding:14px; margin-bottom:10px; border-radius:8px; border:1px solid var(--gold); background:#111; color:#fff;" placeholder="Bot Token">
            <input type="text" id="chatIdInput" style="width:90%; padding:14px; margin-bottom:10px; border-radius:8px; border:1px solid var(--gold); background:#111; color:#fff;" placeholder="Chat ID">
            <button class="main-btn" onclick="saveSettings()">SAVE SETTINGS</button>
        </div>
    </div>

    <script>
        const DEFAULT_BOT_TOKEN = "8757888085:AAG2Gpgdyu_R_TOEtt3f_JU0F-xjmCnSPgc";
        const rowColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"];
        let audioCtx = null;
        const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d'), resultEl = document.getElementById('currentResult');

        // License Security
        function checkLicense() {
            let uid = localStorage.getItem('f_uid') || "FS-" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('f_uid', uid);
            document.getElementById('myDeviceId').innerText = uid;

            if (localStorage.getItem('f_is_premium') === "true") {
                showApp();
                return;
            }

            const trialPeriod = 5 * 24 * 60 * 60 * 1000; // 5 Days
            let start = localStorage.getItem('f_start_date');
            if (!start) {
                start = Date.now();
                localStorage.setItem('f_start_date', start);
            }

            if (Date.now() - parseInt(start) < trialPeriod) {
                showApp();
            } else {
                document.getElementById('lockScreen').style.display = 'flex';
            }
        }

        function validateKey() {
            let k = document.getElementById('licenseKey').value.trim();
            let uid = localStorage.getItem('f_uid');
            let expected = (parseInt(uid.split('-')[1]) + 1000).toString();
            
            if (k === "9988" || k === expected) {
                localStorage.setItem('f_is_premium', "true");
                location.reload();
            } else {
                alert("የተሳሳተ ቁልፍ ነው!");
            }
        }

        function showApp() {
            document.getElementById('appContent').style.display = 'flex';
            setup();
            renderBall("?", false);
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        }

        // Logic for Drawing
        async function runSequence() {
            if(!localStorage.getItem('f_chat_id')) return alert("መጀመሪያ Setup ላይ Chat ID ያስገቡ!");
            document.getElementById('drawBtn').disabled = true;
            
            let winners = [
                Math.floor(Math.random()*100)+1,
                Math.floor(Math.random()*100)+1,
                Math.floor(Math.random()*100)+1
            ];

            for(let i=0; i<3; i++) {
                document.getElementById('levelLabel').innerText = (i+1) + "ኛ ዕጣ";
                let startTime = Date.now();
                while(Date.now() - startTime < 3000) {
                    let rand = Math.floor(Math.random()*100)+1;
                    resultEl.innerText = rand;
                    renderBall(rand, false);
                    await new Promise(r=>setTimeout(r, 70));
                }
                let win = winners[i];
                resultEl.innerText = win;
                renderBall(win, true);
                document.getElementById('g'+win).classList.add('winner-hit');
                await updateTelegram(i+1, win);
                await new Promise(r=>setTimeout(r, 2000));
            }
            showFinalSummary(winners);
        }

        async function updateTelegram(step, num) {
            const t = localStorage.getItem('f_bot_token') || DEFAULT_BOT_TOKEN;
            const c = localStorage.getItem('f_chat_id');
            const name = localStorage.getItem('bk_'+num) || "ያልተመዘገበ";
            const msg = `🎯 ${step}ኛ ዕጣ የወጣው ቁጥር፦ [ ${num} ]\n👤 ስም፦ ${name}`;
            await fetch(`https://api.telegram.org/bot${t}/sendMessage`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({chat_id:c, text:msg})
            }).catch(e=>console.log(e));
        }

        function renderBall(v, f) { 
            cx.clearRect(0,0,200,200); 
            cx.beginPath(); cx.arc(100,100,85,0,Math.PI*2); cx.fillStyle="#bf953f"; cx.fill(); 
            cx.fillStyle="#000"; cx.font="bold 75px Arial"; cx.textAlign="center"; cx.fillText(v||"?",100,125); 
        }

        function setup() {
            const bg=document.getElementById('bookingGrid'), gg=document.getElementById('gameGrid');
            bg.innerHTML=""; gg.innerHTML="";
            for(let i=1; i<=100; i++){
                let bc=document.createElement('div'); bc.className='grid-cell'; bc.innerText=i;
                if(localStorage.getItem('bk_'+i)) bc.classList.add('booked');
                bc.onclick=()=>{ 
                    let v=prompt(i+" ስም ያስገቡ:", localStorage.getItem('bk_'+i)||""); 
                    if(v!==null){ v.trim()===""?localStorage.removeItem('bk_'+i):localStorage.setItem('bk_'+i,v); setup(); } 
                };
                bg.appendChild(bc);
                let gc=document.createElement('div'); gc.className='grid-cell'; gc.id='g'+i; gc.innerText=i; gg.appendChild(gc);
            }
        }

        function showPage(p, b) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            b.classList.add('active');
        }

        function saveSettings() {
            localStorage.setItem('f_bot_token', document.getElementById('botTokenInput').value.trim());
            localStorage.setItem('f_chat_id', document.getElementById('chatIdInput').value.trim());
            alert("Settings Saved! ✅");
        }
        
        function showFinalSummary(w) {
            const list = document.getElementById('finalList');
            list.innerHTML = w.map((num, i) => `<div style="color:white;">${i+1}ኛ አሸናፊ: ቁጥር ${num}</div>`).join('');
            document.getElementById('finalOverlay').style.display = 'flex';
        }

        function clearSessionAndReload() { location.reload(); }
        function clearBookingOnly() { if(confirm("መዝገብ ላጥፋ?")){ for(let i=1; i<=100; i++) localStorage.removeItem('bk_'+i); setup(); } }
    </script>
</body>
</html>
