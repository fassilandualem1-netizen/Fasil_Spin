<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP - Telegram Bot Edition</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --dark-gold: #8a6d29; --red: #ff3333; --blue: #007bff; }
        body { font-family: sans-serif; background: #000; color: var(--gold); text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #statusOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100002; display: none; justify-content: center; align-items: center; font-size: 55px; font-weight: bold; color: var(--bright-gold); }
        .page { display: none; flex: 1; padding: 10px; overflow-y: auto; box-sizing: border-box; padding-bottom: 90px; }
        .page.active { display: flex; flex-direction: column; }

        /* Setup Design */
        #setupBox { background: #111; border: 1px solid var(--gold); margin: 10px; padding: 15px; border-radius: 10px; display: none; text-align: left; }
        #setupBox input { width: 90%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; margin-top: 5px; border-radius: 5px; }

        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 75px; z-index: 1000; } 
        .tab-btn { flex: 1; color: #777; border: none; background: none; font-weight: bold; font-size: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #1a1a1a; }

        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2.5px; background: #151515; padding: 5px; border-radius: 8px; width: 100%; margin: 5px 0; }
        .grid-cell { background: #0a0a0a; font-size: 10px; font-weight: bold; padding: 6px 0; border: 1px solid #222; border-radius: 3px; }
        #bookingGrid .grid-cell { color: #fff !important; font-size: 13px; border-color: #333; }
        .booked { border: 1.2px solid #fff !important; box-shadow: inset 0 0 5px #fff; background: #222 !important; }
        
        .tracking { background: #fff !important; color: #000 !important; transform: scale(1.1); box-shadow: 0 0 10px #fff; }
        .winner-hit { background: var(--red) !important; color: #fff !important; animation: winner-pulse 0.8s infinite; z-index: 10; }
        @keyframes winner-pulse { 0%, 100% { transform: scale(1.1); } 50% { transform: scale(1.3); } }

        .res-row { display: flex; justify-content: space-between; margin: 8px 0; gap: 6px; }
        .res-card { background: #0a0a0a; border: 1.5px solid var(--gold); padding: 5px; border-radius: 10px; width: 32%; }
        .res-card b { font-size: 26px; color: #fff; display: block; }

        canvas { border: 4px solid var(--gold); border-radius: 50%; background: #050505; width: 120px; height: 120px; margin: 5px auto; }
        button#drawBtn { width: 95%; padding: 15px; border-radius: 15px; font-size: 19px; font-weight: bold; background: var(--gold); color: #000; border: none; margin: 5px auto; }
        
        .h-ball-row { display: flex; gap: 10px; margin-top: 8px; }
        .h-ball { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

    <div id="statusOverlay">READY</div>

    <div id="appContent">
        <div id="bookingPage" class="page">
            <h3 style="margin-top:40px;">የተመዘገቡ</h3>
            <button onclick="toggleSetup()" style="background:#222; color:var(--gold); border:1px solid #444; width:auto; padding:5px 15px; font-size:12px; margin-bottom:10px;">⚙️ SETUP (Telegram)</button>
            
            <div id="setupBox">
                <label style="font-size:12px;">Telegram Chat ID:</label><br>
                <input type="text" id="chatIdInput" placeholder="-100xxxxxxx">
                <button onclick="saveSetup()" style="background:var(--gold); color:#000; padding:8px; margin-top:10px; width:100%;">SAVE</button>
            </div>

            <div id="bookingGrid" class="grid-container"></div>
            <button style="color:red; border:1px solid #444; background:none; padding:10px; border-radius:10px; margin-top:15px; width:95%;" onclick="clearData()">ሁሉንም አጽዳ</button>
        </div>
        
        <div id="gamePage" class="page active">
            <div style="margin-top:40px; color:#fff; font-size:12px; display:flex; justify-content:center; gap:10px; align-items:center;">
                <div style="width:8px; height:8px; background:red; border-radius:50%; animation:blink 1s infinite;"></div>
                <b>LIVE TRACKING</b> | <span id="clock">00:00:00</span>
            </div>
            
            <div id="gameGrid" class="grid-container"></div>
            <div class="res-row">
                <div class="res-card"><span>1ኛ</span><b id="v1">?</b></div>
                <div class="res-card"><span>2ኛ</span><b id="v2">?</b></div>
                <div class="res-card"><span>3ኛ</span><b id="v3">?</b></div>
            </div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <button id="drawBtn" onclick="runSequence()">START DRAW</button>
            <button id="resetBtn" onclick="resetGame()" style="display:none; background:#111; color:#fff; padding:14px; border-radius:15px; border:1px solid #444; width:95%; margin:5px auto;">RE-START</button>
        </div>

        <div id="historyPage" class="page"><div id="historyList"></div></div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">📋 መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">🕒 ታሪክ</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8757888085:AAG2Gpgdyu_R_TOEtt3f_JU0F-xjmCnSPgc";
        const rowColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"];

        function initApp() {
            setup();
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
            document.getElementById('chatIdInput').value = localStorage.getItem('f_chatId') || "";
        }

        function setup() {
            const bg = document.getElementById('bookingGrid'), gg = document.getElementById('gameGrid');
            bg.innerHTML = ""; gg.innerHTML = "";
            for(let i=1; i<=100; i++) {
                let color = rowColors[Math.floor((i-1)/10)];
                let bc = document.createElement('div'); bc.className = 'grid-cell'; bc.innerText = i;
                if(localStorage.getItem('bk_'+i)) bc.classList.add('booked');
                bc.onclick = () => {
                    let v = prompt(i+" ስም:", localStorage.getItem('bk_'+i)||"");
                    if(v!==null) { if(v.trim()==="") localStorage.removeItem('bk_'+i); else localStorage.setItem('bk_'+i, v); setup(); }
                };
                bg.appendChild(bc);
                let gc = document.createElement('div'); gc.className = 'grid-cell'; gc.id = 'g'+i; gc.innerText = i; 
                gc.style.color = color; gc.style.borderColor = color;
                gg.appendChild(gc);
            }
        }

        async function runSequence() {
            document.getElementById('drawBtn').style.display = 'none';
            const ov = document.getElementById('statusOverlay'); ov.style.display = 'flex';
            const sfx = [440, 554, 659]; // Do, Mi, So
            let idx = 0;
            for(let s of ["READY","VERIFYING","GO!"]) { 
                ov.innerText = s; 
                playSfx(sfx[idx++], 0.4, 0.1); 
                await new Promise(r=>setTimeout(r,900)); 
            }
            ov.style.display = 'none'; startLiveDraw();
        }

        async function startLiveDraw() {
            let winners = []; while(winners.length < 3) { let r = Math.floor(Math.random()*100)+1; if(!winners.includes(r)) winners.push(r); }
            for(let i=1; i<=3; i++) {
                let win = winners[i-1];
                for(let j=0; j<22; j++) {
                    let temp = Math.floor(Math.random()*100)+1;
                    document.getElementById('g'+temp).classList.add('tracking');
                    renderBall(0, false);
                    playSfx(900, 0.03, 0.05);
                    await new Promise(r=>setTimeout(r, 65));
                    document.getElementById('g'+temp).classList.remove('tracking');
                }
                renderBall(win, true); playSfx(250, 0.8, 0.2);
                document.getElementById('v'+i).innerText = win;
                document.getElementById('g'+win).classList.add('winner-hit');
                await new Promise(r=>setTimeout(r, 1500));
            }
            saveHist(winners);
            sendToTelegram(winners);
            document.getElementById('resetBtn').style.display = 'block';
        }

        async function sendToTelegram(winners) {
            const chatId = localStorage.getItem('f_chatId');
            if(!chatId) return;
            
            const names = winners.map(num => localStorage.getItem('bk_'+num) || "ያልተመዘገበ");
            const msg = `
🌟 **የዛሬው የBINGO ዕጣ አሸናፊዎች** 🌟
━━━━━━━━━━━━━━━━
🥇 1ኛ ዕጣ:  【 ${winners[0]} 】- ${names[0]}
🥈 2ኛ ዕጣ:  【 ${winners[1]} 】- ${names[1]}
🥉 3ኛ ዕጣ:  【 ${winners[2]} 】- ${names[2]}
━━━━━━━━━━━━━━━━
🎉 እንኳን ደስ አላችሁ!
🕒 ሰዓት: ${new Date().toLocaleTimeString()}
            `;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;
            try { await fetch(url); } catch(e) { console.error("Telegram Error", e); }
        }

        function toggleSetup() { let b = document.getElementById('setupBox'); b.style.display = b.style.display==='block'?'none':'block'; }
        function saveSetup() { localStorage.setItem('f_chatId', document.getElementById('chatIdInput').value); alert("Saved!"); toggleSetup(); }

        function playSfx(freq, dur, vol) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = freq; g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d');
        function renderBall(val, final) {
            cx.clearRect(0,0,200,200);
            let d = final ? val : Math.floor(Math.random()*100)+1;
            let color = (final && val > 0) ? rowColors[Math.floor((val-1)/10)] : '#bf953f';
            let g = cx.createRadialGradient(70,70,10,100,100,80);
            g.addColorStop(0,'#fcf6ba'); g.addColorStop(1, color);
            cx.beginPath(); cx.arc(100,100,85,0,Math.PI*2); cx.fillStyle=g; cx.fill();
            cx.fillStyle="#000"; cx.font="bold 75px Arial"; cx.textAlign="center"; cx.fillText(d||"?",100,125);
        }

        function showPage(p, b) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById(p).classList.add('active'); b.classList.add('active');
            if(p==='historyPage') loadHistory();
        }

        function saveHist(w) {
            let h = JSON.parse(localStorage.getItem('f_h')||"[]");
            h.unshift({t: new Date().toLocaleTimeString(), r: w});
            localStorage.setItem('f_h', JSON.stringify(h.slice(0,20)));
        }

        function loadHistory() {
            let h = JSON.parse(localStorage.getItem('f_h')||"[]");
            document.getElementById('historyList').innerHTML = h.map(x => {
                let balls = x.r.map((num, idx) => `<div class="h-ball" style="background:radial-gradient(circle at 30% 30%,#fff,${rowColors[Math.floor((num-1)/10)]}); margin:0 5px;">${num}</div>`).join('');
                return `<div style="background:#111; border-left:4px solid var(--gold); margin:10px; padding:12px; border-radius:8px; text-align:left;"><small style="color:#888;">🕒 ${x.t}</small><div class="h-ball-row" style="margin-top:5px;">${balls}</div></div>`;
            }).join('');
        }

        function resetGame() { location.reload(); }
        function clearData() { if(confirm("ሁሉንም አጽዳ?")) { localStorage.clear(); location.reload(); } }
        @keyframes blink { 50% { opacity: 0; } }
    </script>
</body>
</html>
