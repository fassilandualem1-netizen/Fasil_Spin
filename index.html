<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP PRO - MASTER EDITION</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --red: #ff3333; --neon: #00f2ff; --dark: #000; }
        
        html, body { 
            overflow: hidden; height: 100vh; width: 100vw; margin: 0; padding: 0; 
            background: var(--dark); font-family: 'Segoe UI', sans-serif; 
            -webkit-user-select: none; user-select: none; color: var(--gold); 
        }

        #appContent { display: none; height: 100vh; flex-direction: column; }
        
        .page { 
            display: none; flex: 1; padding: 15px; 
            overflow-y: auto; box-sizing: border-box; 
            background: var(--dark); height: calc(100vh - 160px);
            flex-direction: column;
        }
        .page.active { display: flex !important; }

        .board-selector { 
            background: #000; padding: 50px 10px 15px 10px; 
            display: flex; justify-content: space-around; gap: 8px; 
        }
        .board-opt { 
            flex: 1; padding: 12px; border: 1px solid #222; 
            border-radius: 12px; font-size: 13px; cursor: pointer; 
            text-align: center; color: #888; background: #0a0a0a;
        }
        .board-opt.active { 
            border-color: var(--gold); background: var(--gold); 
            color: #000; font-weight: bold; box-shadow: 0 0 15px rgba(191, 149, 63, 0.4); 
        }

        .live-status-bar { 
            display: flex; align-items: center; justify-content: center; 
            background: #0a0a0a; padding: 5px 15px; border-radius: 50px; 
            border: 1px solid #333; width: fit-content; margin: 0 auto 10px auto; 
            font-size: 11px; color: #fff; 
        }
        .blink-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; margin-right: 8px; animation: live-blink 1s infinite; }
        @keyframes live-blink { 50% { opacity: 0.3; } }

        #focusWinnerDisplay { 
            height: 90px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: radial-gradient(circle, #222 0%, #000 70%); 
            border-radius: 20px; border: 1px solid #222; margin-bottom: 5px; 
        }
        .focus-num { font-size: 65px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--neon); line-height: 1; }

        .grid-container { 
            display: grid; gap: 4px; background: #080808; 
            padding: 8px; border-radius: 15px; border: 1px solid #222; 
        }
        .grid-cell { 
            background: #050505; border: 1px solid #1a1a1a; 
            border-radius: 5px; text-align: center; font-weight: bold; 
            display: flex; align-items: center; justify-content: center; 
        }
        .tracking { background: var(--neon) !important; color: #000 !important; box-shadow: 0 0 10px var(--neon); }
        .booked { border: 1.5px solid #fff !important; background: #222 !important; color: #fff !important; }
        .winner-hit { background: var(--red) !important; color: white !important; border: 1.5px solid white !important; box-shadow: 0 0 15px var(--red); transform: scale(1.05); }

        .draw-btn-container { padding: 10px 15px 90px 15px; }
        button.main-btn { 
            width: 100%; padding: 18px; border-radius: 15px; 
            font-size: 20px; font-weight: bold; 
            background: linear-gradient(to bottom, var(--bright-gold), var(--gold)); 
            color: #000; border: none; cursor: pointer;
        }

        .tabs { 
            display: flex; background: #111; border-top: 2px solid var(--gold); 
            position: fixed; bottom: 0; width: 100%; height: 80px; z-index: 1000; 
        }
        .tab-btn { flex: 1; color: #666; border: none; background: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; background: #1a1a1a; border-top: 4px solid var(--gold); }
    </style>
</head>
<body onload="checkLicense()">

    <div id="lockScreen" style="position:fixed; inset:0; background:#000; z-index:9999; display:none; flex-direction:column; justify-content:center; align-items:center; padding:20px; text-align:center;">
        <h1 style="color:var(--gold);">FASIL VIP PRO</h1>
        <div id="myDeviceId" style="color:#555; margin-bottom:20px;">ID: ---</div>
        <input type="text" id="licenseKey" placeholder="Activation Key" style="width:80%; padding:15px; text-align:center; border-radius:12px; background:#111; color:#fff; border:1px solid var(--gold);">
        <br><br>
        <button class="main-btn" onclick="validateKey()">ACTIVATE SYSTEM</button>
    </div>

    <div id="appContent">
        <div class="board-selector">
            <div class="board-opt active" id="opt25" onclick="changeBoard(25)">1-25</div>
            <div class="board-opt" id="opt50" onclick="changeBoard(50)">1-50</div>
            <div class="board-opt" id="opt100" onclick="changeBoard(100)">1-100</div>
        </div>

        <div id="gamePage" class="page active">
            <div class="live-status-bar"><div class="blink-dot"></div>LIVE | <span id="liveClock">00:00:00</span></div>
            <div id="focusWinnerDisplay"><div class="focus-num" id="currentResult">--</div></div>
            <div id="gameGrid" class="grid-container"></div>
            <canvas id="bingoCanvas" width="200" height="200" style="width:70px; height:70px; margin:10px auto; border-radius:50%; border:2px solid var(--gold); display:block;"></canvas>
            <div class="draw-btn-container"><button id="drawBtn" class="main-btn" onclick="runSequence()">START DRAW</button></div>
        </div>

        <div id="bookingPage" class="page">
            <h3 style="color:var(--bright-gold);">📋 የመዝገብ ሰሌዳ</h3>
            <div id="bookingGrid" class="grid-container" style="flex:1; overflow-y:auto; padding-bottom:100px;"></div>
            <button onclick="clearBookingData()" style="color:red; background:none; border:1px solid #333; padding:12px; border-radius:10px; margin-top:10px; width:100%;">ሰሌዳውን አፅዳ</button>
        </div>

        <div id="setupPage" class="page">
            <h3>⚙️ SETTINGS</h3>
            <input type="text" id="botTokenInput" placeholder="Enter Bot Token" style="width:100%; padding:15px; margin-bottom:15px; background:#111; color:#fff; border:1px solid #333; border-radius:12px;">
            <input type="text" id="chatIdInput" placeholder="Enter Chat ID" style="width:100%; padding:15px; background:#111; color:#fff; border:1px solid #333; border-radius:12px;">
            <br><br>
            <button class="main-btn" onclick="saveSettings()">SAVE SETTINGS</button>
        </div>

        <div id="aboutPage" class="page">
            <h3 style="text-align:center;">FASIL VIP TECH</h3>
            <div style="background:#0a0a0a; padding:20px; border-radius:15px; border:1px solid #222; text-align:center;">
                <p>Premium Bingo System</p>
                <p>Telegram: @Fassilandualem</p>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">📋 መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('setupPage', this)">⚙️ SETUP</button>
            <button class="tab-btn" onclick="showPage('aboutPage', this)">ℹ️ ABOUT</button>
        </div>
    </div>

    <script>
        const DEFAULT_TOKEN = "8757888085:AAG2Gpgdyu_R_TOEtt3f_JU0F-xjmCnSPgc";
        const rowColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"];
        let currentMax = 25, audioCtx = null;
        const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d'), resEl = document.getElementById('currentResult');

        function playSound(f, t, d, v=1.5) { 
            try { 
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let o=audioCtx.createOscillator(), g=audioCtx.createGain(); 
                o.type=t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(v, audioCtx.currentTime); 
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+d);
                o.connect(g); g.connect(audioCtx.destination); 
                o.start(); o.stop(audioCtx.currentTime+d); 
            } catch(e){} 
        }

        function checkLicense() {
            let uid = localStorage.getItem('f_uid') || Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('f_uid', uid);
            document.getElementById('myDeviceId').innerText = "DEVICE ID: " + uid;
            if (localStorage.getItem('f_is_premium') === "true") {
                document.getElementById('appContent').style.display = 'flex';
                openApp();
            } else { document.getElementById('lockScreen').style.display = 'flex'; }
        }

        function validateKey() {
            let k = document.getElementById('licenseKey').value;
            if (k === "9988") { localStorage.setItem('f_is_premium', "true"); location.reload(); }
            else alert("Invalid Key!");
        }

        function openApp() {
            loadSettings(); setupGrids(); renderBall("?", false);
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        }

        function changeBoard(max) {
            currentMax = max;
            document.querySelectorAll('.board-opt').forEach(el => el.classList.remove('active'));
            document.getElementById('opt' + max).classList.add('active');
            setupGrids();
        }

        function setupGrids() {
            const bg = document.getElementById('bookingGrid'), gg = document.getElementById('gameGrid');
            bg.innerHTML = ""; gg.innerHTML = "";
            
            // Column Logic (Updated)
            let cols = 5;
            if (currentMax === 50) cols = 6;
            if (currentMax === 100) cols = 8;

            bg.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            gg.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            for(let i=1; i<=currentMax; i++){
                let key = `bk_${currentMax}_${i}`;
                let makeCell = (p) => {
                    let d = document.createElement('div'); d.className = 'grid-cell'; d.innerText = i;
                    d.style.padding = (currentMax === 25) ? "15px 0" : (currentMax === 50 ? "10px 0" : "8px 0");
                    d.style.fontSize = (currentMax === 25) ? "18px" : (currentMax === 50 ? "14px" : "11px");
                    if(p==='g') { d.id = 'g'+i; d.style.color = rowColors[Math.floor((i-1)/(currentMax/10))]; }
                    return d;
                };
                
                gg.appendChild(makeCell('g'));
                let bc = makeCell('b'); if(localStorage.getItem(key)) bc.classList.add('booked');
                bc.onclick = () => { 
                    let v = prompt(i+" ስም:", localStorage.getItem(key)||''); 
                    if(v!==null){ v===''?localStorage.removeItem(key):localStorage.setItem(key,v); setupGrids(); } 
                };
                bg.appendChild(bc);
            }
        }

        async function runSequence() {
            if(!localStorage.getItem('f_chat_id')) return alert("Setup Chat ID!");
            document.getElementById('drawBtn').disabled = true;
            document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('winner-hit'));
            let winners = [];

            for(let i = 1; i <= 3; i++) {
                renderBall("?", false);
                await new Promise(d => setTimeout(d, 500));
                let start = Date.now();
                while(Date.now() - start < 6000) {
                    let r = Math.floor(Math.random() * currentMax) + 1;
                    resEl.innerText = r; renderBall(r, false);
                    document.querySelectorAll('#gameGrid .grid-cell').forEach(c => c.classList.remove('tracking'));
                    let cell = document.getElementById('g'+r); if(cell) cell.classList.add('tracking');
                    
                    // ድምፅ እዚህ ጋር ገብቷል
                    playSound(Math.random()*400+200, 'triangle', 0.1, 0.4);
                    
                    await new Promise(d => setTimeout(d, 80));
                }
                let w; do { w = Math.floor(Math.random() * currentMax) + 1; } while(winners.includes(w));
                winners.push(w); resEl.innerText = w; renderBall(w, true);
                document.getElementById('g'+w).classList.add('winner-hit');
                await sendMsg(`🎯 ${i}ኛ ዕጣ: ${w}\n👤 ስም: ${localStorage.getItem(`bk_${currentMax}_${w}`)||'ያልተመዘገበ'}`);
                await new Promise(d => setTimeout(d, 2500));
            }
            document.getElementById('drawBtn').disabled = false;
        }

        async function sendMsg(text) {
            const t = localStorage.getItem('f_bot_token') || DEFAULT_TOKEN, c = localStorage.getItem('f_chat_id');
            const url = `https://api.telegram.org/bot${t}/sendMessage?chat_id=${c}&text=${encodeURIComponent(text)}`;
            try { await fetch(url); } catch(e){}
        }

        function renderBall(v, f) {
            cx.clearRect(0,0,200,200);
            cx.beginPath(); cx.arc(100,100,90,0,Math.PI*2);
            cx.fillStyle = f ? "#00ff00" : "#222"; cx.fill();
            cx.strokeStyle = "#bf953f"; cx.lineWidth = 5; cx.stroke();
            cx.fillStyle = f ? "#000" : "#fff"; cx.font = "bold 80px Arial"; cx.textAlign = "center";
            cx.fillText(v, 100, 130);
        }

        function showPage(p, btn) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active'); btn.classList.add('active');
        }

        function saveSettings() {
            localStorage.setItem('f_bot_token', document.getElementById('botTokenInput').value);
            localStorage.setItem('f_chat_id', document.getElementById('chatIdInput').value);
            alert("Saved! ✅");
        }
        function loadSettings() {
            document.getElementById('botTokenInput').value = localStorage.getItem('f_bot_token') || "";
            document.getElementById('chatIdInput').value = localStorage.getItem('f_chat_id') || "";
        }
        function clearBookingData() { if(confirm("አፅዳ?")) { for(let i=1; i<=100; i++) localStorage.removeItem(`bk_${currentMax}_${i}`); setupGrids(); } }
    </script>
</body>
</html>
