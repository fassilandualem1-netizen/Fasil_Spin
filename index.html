<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FASIL VIP PRO</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --dark-gold: #8a6d29; }
        body { font-family: sans-serif; background: #000; color: var(--gold); text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #lockScreen { position: fixed; inset: 0; background: #000; z-index: 100001; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .lock-box { border: 2px solid var(--gold); padding: 40px 20px; border-radius: 25px; background: #000; width: 85%; max-width: 400px; box-sizing: border-box; }
        #activationKey { width: 100%; padding: 15px; text-align: center; font-size: 22px; border-radius: 12px; border: 1px solid var(--gold); background: #000; color: #fff; margin: 20px 0; box-sizing: border-box; }
        .act-btn { width: 60%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; font-size: 16px; color: #000; }

        .tabs { display: flex; background: #000; border-top: 2px solid #333; position: fixed; bottom: 0; width: 100%; height: 75px; z-index: 1000; } 
        .tab-btn { flex: 1; padding: 10px; color: #777; border: none; background: none; font-weight: bold; font-size: 16px; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #111; }

        .page { display: none; padding: 10px; flex: 1; box-sizing: border-box; flex-direction: column; overflow-y: auto; padding-bottom: 90px; }
        .page.active { display: flex; }

        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #000; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-top: 15px; }
        .grid-cell { background: #111; color: var(--gold); font-size: 12px; font-weight: bold; padding: 12px 0; border-radius: 4px; border: 1px solid #222; }
        .booked { background: linear-gradient(135deg, var(--gold), var(--dark-gold)) !important; color: #000 !important; }
        .active-hit { background: red !important; color: #fff !important; }

        .res-row { display: flex; justify-content: space-between; margin: 15px 0; gap: 8px; }
        .res-card { background: #000; border: 1px solid var(--gold); padding: 12px; border-radius: 12px; width: 32%; }
        .res-card b { font-size: 32px; color: #fff; display: block; }

        .draw-circle { width: 160px; height: 160px; border: 5px solid var(--gold); border-radius: 50%; margin: 10px auto; display: flex; justify-content: center; align-items: center; }
        .draw-val { font-size: 55px; font-weight: bold; color: #fff; }
        
        button#drawBtn { width: 90%; padding: 18px; border-radius: 15px; font-size: 22px; font-weight: bold; background: var(--gold); color: #000; border: none; margin: 15px auto; }
        .clear-btn { color: #ff4444; border: 1px solid #333; background: none; padding: 12px; border-radius: 12px; margin-top: 30px; font-weight: bold; width: 60%; align-self: center; }
    </style>
</head>
<body onload="initSystem()">

    <div id="lockScreen">
        <div class="lock-box">
            <h2 id="lockTitle">FASIL VIP</h2>
            <div id="requestCode" style="font-size:45px; color:#fff; margin:20px 0; font-weight:bold; letter-spacing: 8px; border: 1px dashed var(--gold); padding: 10px;">0000</div>
            <p id="lockMsg" style="color: #888;">ይህንን ኮድ በ 2 አባዝተው ያስገቡ</p>
            <input type="number" id="activationKey" placeholder="ቁጥር ያስገቡ">
            <button class="act-btn" onclick="handleActivation()">ACTIVATE</button>
        </div>
    </div>

    <div id="appContent" style="display:none; flex:1; flex-direction:column;">
        <div id="bookingPage" class="page">
            <div id="bookingGrid" class="grid-container"></div>
            <button class="clear-btn" onclick="safeClear()">ሁሉንም አጽዳ</button>
        </div>
        
        <div id="gamePage" class="page active">
            <div style="background:#0a0a0a; border: 1px solid #333; padding:8px; border-radius:20px; margin: 5px auto; width: 90%; color: #fff;">
                <span id="liveClock">00:00:00</span>
            </div>
            <div id="gameGrid" class="grid-container"></div>
            <div class="res-row">
                <div class="res-card"><span>1ኛ</span><b id="v1">?</b></div>
                <div class="res-card"><span>2ኛ</span><b id="v2">?</b></div>
                <div class="res-card"><span>3ኛ</span><b id="v3">?</b></div>
            </div>
            <div class="draw-circle"><div class="draw-val" id="circleDisplay">?</div></div>
            <button id="drawBtn" onclick="startDraw()">START DRAW</button>
        </div>

        <div id="historyPage" class="page"><div id="historyList"></div></div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">ታሪክ</button>
        </div>
    </div>

    <script>
        let generatedCode = Math.floor(1000 + Math.random() * 8999);
        
        function initSystem() {
            // ኮዱን ስክሪኑ ላይ ያሳያል
            document.getElementById('requestCode').innerText = generatedCode;
            
            if (!localStorage.getItem('_start_time')) {
                localStorage.setItem('_start_time', Date.now());
            }

            const startTime = parseInt(localStorage.getItem('_start_time'));
            const days = (Date.now() - startTime) / (1000 * 60 * 60 * 24);

            if (days > 5 && localStorage.getItem('is_pro') !== 'true') {
                document.getElementById('lockTitle').innerText = "EXPIRED";
                document.getElementById('lockMsg').innerText = "ነፃ ጊዜ አልቋል! Master Key ያስገቡ።";
            } else if (localStorage.getItem('is_unlocked') === 'true' || localStorage.getItem('is_pro') === 'true') {
                showMainApp();
            }
            
            setupGrids();
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        }

        function handleActivation() {
            const input = parseInt(document.getElementById('activationKey').value);
            const startTime = parseInt(localStorage.getItem('_start_time'));
            const days = (Date.now() - startTime) / (1000 * 60 * 60 * 24);

            if (days > 5) {
                if (input === 9988) {
                    localStorage.setItem('is_pro', 'true');
                    showMainApp();
                } else { alert("Master Key ያስገቡ!"); }
            } else {
                if (input === generatedCode * 2 || input === 9988) {
                    localStorage.setItem('is_unlocked', 'true');
                    showMainApp();
                } else { alert("የተሳሳተ ኮድ!"); }
            }
        }

        function showMainApp() {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('appContent').style.display = 'flex';
        }

        function setupGrids() {
            const bg = document.getElementById('bookingGrid'), gg = document.getElementById('gameGrid');
            bg.innerHTML = ""; gg.innerHTML = "";
            for(let i=1; i<=100; i++) {
                let bc = document.createElement('div'); bc.className = 'grid-cell'; bc.innerText = i;
                if(localStorage.getItem('bk_'+i)) bc.classList.add('booked');
                bc.onclick = () => {
                    let v = prompt(i+" ስም:", localStorage.getItem('bk_'+i)||"");
                    if(v!==null) { localStorage.setItem('bk_'+i, v); setupGrids(); }
                };
                bg.appendChild(bc);
                let gc = document.createElement('div'); gc.className = 'grid-cell'; gc.id = 'g'+i; gc.innerText = i; gg.appendChild(gc);
            }
        }

        function showPage(p, b) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            b.classList.add('active');
        }

        function safeClear() {
            if(confirm("መዝገብ ይጥፋ?")) {
                Object.keys(localStorage).forEach(k => { if(k.startsWith('bk_')) localStorage.removeItem(k); });
                setupGrids();
            }
        }
    </script>
</body>
</html>
