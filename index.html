<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP PRO - PREMIUM EDITION</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --red: #ff3333; --neon: #00f2ff; --dark: #000; --panel: #0a0a0a; }
        
        html, body { 
            overflow: hidden; height: 100vh; width: 100vw; margin: 0; padding: 0; 
            background: var(--dark); font-family: 'Segoe UI', sans-serif; 
            color: var(--gold); -webkit-user-select: none; user-select: none;
        }

        #appContent { display: none; height: 100vh; flex-direction: column; }
        
        /* ሁሉም ገጾች ሙሉ ጥቁር እና Full Screen እንዲሆኑ */
        .page { 
            display: none; flex: 1; padding: 15px; 
            overflow-y: auto; box-sizing: border-box; 
            background: var(--dark); height: calc(100vh - 160px);
        }
        .page.active { display: flex; flex-direction: column; }

        /* ሰሌዳ መቀያየሪያዎች - ዝቅ ብለው (ከስልኩ Notch ርቀው) */
        .board-selector { 
            background: var(--dark); padding: 50px 10px 15px 10px; 
            display: flex; justify-content: space-around; gap: 10px; 
        }
        .board-opt { 
            flex: 1; padding: 12px; border: 1px solid #222; 
            border-radius: 12px; font-size: 13px; cursor: pointer; 
            text-align: center; color: #888; background: #0a0a0a;
        }
        .board-opt.active { 
            border-color: var(--gold); background: var(--gold); 
            color: #000; font-weight: bold; box-shadow: 0 0 15px rgba(191, 149, 63, 0.4); 
        }

        /* ዕጣ ገጽ አቀማመጥ */
        .live-status-bar { 
            display: flex; align-items: center; justify-content: center; 
            background: #0d0d0d; padding: 6px 15px; border-radius: 50px; 
            border: 1px solid #222; width: fit-content; margin: 0 auto 10px auto; 
            font-size: 11px; color: #fff; 
        }
        .blink-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; margin-right: 8px; animation: live-blink 1s infinite; }
        @keyframes live-blink { 50% { opacity: 0.3; } }

        #focusWinnerDisplay { 
            height: 100px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%); 
            border-radius: 20px; border: 1px solid #222; margin-bottom: 10px; flex-shrink: 0;
        }
        .focus-num { font-size: 70px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--neon); line-height: 1; }

        /* ሰሌዳ (Grid) */
        .grid-container { 
            display: grid; gap: 4px; background: #050505; 
            padding: 8px; border-radius: 15px; border: 1px solid #111; 
        }
        .grid-cell { 
            background: #0a0a0a; border: 1px solid #1a1a1a; 
            border-radius: 5px; text-align: center; font-weight: bold; 
            display: flex; align-items: center; justify-content: center; 
        }
        .tracking { background: var(--neon) !important; color: #000 !important; }
        .booked { border: 1.5px solid #fff !important; background: #1a1a1a !important; color: #fff !important; }
        .winner-hit { background: var(--red) !important; color: #fff !important; border: 2px solid #fff !important; box-shadow: 0 0 15px var(--red); }

        /* Input Styles for Setup & About */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 12px; color: #555; margin-bottom: 8px; margin-left: 5px; }
        input[type="text"] {
            width: 100%; padding: 16px; background: #0a0a0a; 
            color: #fff; border: 1px solid #222; border-radius: 12px; 
            box-sizing: border-box; font-size: 14px;
        }

        .draw-btn-container { padding: 10px 15px 95px 15px; flex-shrink: 0; }
        button.main-btn { 
            width: 100%; padding: 18px; border-radius: 15px; 
            font-size: 20px; font-weight: bold; 
            background: linear-gradient(to bottom, var(--bright-gold), var(--gold)); 
            color: #000; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Bottom Tab Bar */
        .tabs { 
            display: flex; background: #0a0a0a; border-top: 1px solid #222; 
            position: fixed; bottom: 0; width: 100%; height: 85px; z-index: 1000; 
        }
        .tab-btn { 
            flex: 1; color: #555; border: none; background: none; 
            font-size: 12px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
        }
        .tab-btn.active { color: var(--gold); background: #000; border-top: 3px solid var(--gold); }
        .tab-icon { font-size: 20px; margin-bottom: 5px; }

        h2.page-title { border-bottom: 1px solid #222; padding-bottom: 10px; color: var(--bright-gold); font-size: 20px; }
    </style>
</head>
<body onload="checkLicense()">

    <div id="lockScreen" style="position:fixed; inset:0; background:#000; z-index:9999; display:none; flex-direction:column; justify-content:center; align-items:center; padding:20px;">
        <h1 style="color:var(--gold);">FASIL VIP PRO</h1>
        <div id="myDeviceId" style="color:#444; margin-bottom:20px; font-family:monospace; font-size: 12px;">ID: ---</div>
        <input type="text" id="licenseKey" placeholder="Activation Key" style="text-align:center; margin-bottom: 20px;">
        <button class="main-btn" onclick="validateKey()">ACTIVATE SYSTEM</button>
    </div>

    <div id="appContent">
        <div class="board-selector">
            <div class="board-opt active" id="opt25" onclick="changeBoard(25)">1-25</div>
            <div class="board-opt" id="opt50" onclick="changeBoard(50)">1-50</div>
            <div class="board-opt" id="opt100" onclick="changeBoard(100)">1-100</div>
        </div>

        <div id="gamePage" class="page active">
            <div class="live-status-bar"><div class="blink-dot"></div>LIVE | <span id="liveClock">00:00:00</span></div>
            <div id="focusWinnerDisplay"><div class="focus-num" id="currentResult">--</div></div>
            <div id="gameGrid" class="grid-container"></div>
            <canvas id="bingoCanvas" width="200" height="200" style="width:75px; height:75px; margin:10px auto; border-radius:50%; border:2px solid var(--gold); display:block;"></canvas>
            <div class="draw-btn-container"><button id="drawBtn" class="main-btn" onclick="runSequence()">START DRAW</button></div>
        </div>

        <div id="bookingPage" class="page">
            <h2 class="page-title">📋 የመዝገብ ሰሌዳ</h2>
            <p style="font-size:12px; color:#555; margin-bottom:10px;">ቁጥር በመንካት ስም ይመዝግቡ</p>
            <div id="bookingGrid" class="grid-container" style="overflow-y:auto; padding-bottom:20px;"></div>
            <button onclick="clearBookingData()" style="color:red; background:none; border:1px solid #333; padding:15px; border-radius:12px; margin-top:20px; width:100%;">ሁሉንም ስም አፅዳ</button>
        </div>

        <div id="setupPage" class="page">
            <h2 class="page-title">⚙️ Telegram Settings</h2>
            <div class="form-group" style="margin-top:20px;">
                <label class="form-label">BOT TOKEN</label>
                <input type="text" id="botTokenInput" placeholder="8757888085:AA...">
            </div>
            <div class="form-group">
                <label class="form-label">CHAT ID / CHANNEL ID</label>
                <input type="text" id="chatIdInput" placeholder="-100...">
            </div>
            <button class="main-btn" onclick="saveSettings()">SAVE CONFIGURATION</button>
            <p style="color:#444; font-size:11px; margin-top:15px; text-align:center;">መረጃው ስልክዎ ላይ ብቻ ነው የሚቀመጠው</p>
        </div>

        <div id="aboutPage" class="page">
            <h2 class="page-title">ℹ️ About Developer</h2>
            <div style="text-align:center; padding:30px 0;">
                <div style="width:90px; height:90px; background:linear-gradient(135deg, var(--bright-gold), var(--gold)); border-radius:50%; margin:0 auto 20px auto; display:flex; align-items:center; justify-content:center; color:#000; font-size:45px; font-weight:bold; box-shadow: 0 0 20px rgba(191,149,63,0.3);">F</div>
                <h2 style="margin:5px 0; color:#fff;">FASIL VIP TECH</h2>
                <p style="color:#666; font-size:14px; margin-bottom:30px;">Professional Bingo Solutions</p>
                
                <div style="background:#080808; padding:20px; border-radius:20px; border:1px solid #111; text-align:left;">
                    <a href="https://t.me/Fassilandualem" style="display:flex; align-items:center; text-decoration:none; color:#fff; margin-bottom:20px;">
                        <span style="font-size:24px; margin-right:15px;">📱</span> 
                        <div><div style="font-size:11px; color:#555;">Telegram Admin</div><b>@Fassilandualem</b></div>
                    </a>
                    <a href="tel:+251951381356" style="display:flex; align-items:center; text-decoration:none; color:#fff;">
                        <span style="font-size:24px; margin-right:15px;">📞</span> 
                        <div><div style="font-size:11px; color:#555;">Phone Number</div><b>+251 951 381 356</b></div>
                    </a>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)"><span class="tab-icon">📋</span>መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)"><span class="tab-icon">🎰</span>ዕጣ</button>
            <button class="tab-btn" onclick="showPage('setupPage', this)"><span class="tab-icon">⚙️</span>SETUP</button>
            <button class="tab-btn" onclick="showPage('aboutPage', this)"><span class="tab-icon">ℹ️</span>ABOUT</button>
        </div>
    </div>

    <script>
        const DEFAULT_TOKEN = "8757888085:AAG2Gpgdyu_R_TOEtt3f_JU0F-xjmCnSPgc";
        const rowColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"];
        let currentMax = 25, winners = [];
        const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d'), resEl = document.getElementById('currentResult');

        function checkLicense() {
            let uid = localStorage.getItem('f_uid') || Math.floor(1000 + Math.random() * 8999);
            localStorage.setItem('f_uid', uid);
            document.getElementById('myDeviceId').innerText = "DEVICE ID: " + uid;
            if (localStorage.getItem('f_is_premium') === "true") {
                document.getElementById('appContent').style.display = 'flex';
                openApp();
            } else {
                document.getElementById('lockScreen').style.display = 'flex';
            }
        }

        function validateKey() {
            let k = document.getElementById('licenseKey').value;
            if (k === "9988") { localStorage.setItem('f_is_premium', "true"); location.reload(); }
            else alert("ቁልፉ የተሳሳተ ነው!");
        }

        function openApp() {
            loadSettings();
            setupGrids();
            renderBall("?", false);
            setInterval(() => { 
                document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('en-GB'); 
            }, 1000);
        }

        function changeBoard(max) {
            currentMax = max;
            document.querySelectorAll('.board-opt').forEach(el => el.classList.remove('active'));
            document.getElementById('opt' + max).classList.add('active');
            setupGrids();
        }

        function setupGrids() {
            const bg = document.getElementById('bookingGrid'), gg = document.getElementById('gameGrid');
            bg.innerHTML = ""; gg.innerHTML = "";
            let cols = (currentMax === 25) ? 5 : 10;
            bg.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            gg.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            for(let i=1; i<=currentMax; i++){
                let key = `bk_${currentMax}_${i}`;
                let makeCell = (p) => {
                    let d = document.createElement('div'); d.className = 'grid-cell'; d.innerText = i;
                    d.style.padding = (currentMax === 25) ? "15px 0" : "8px 0";
                    d.style.fontSize = (currentMax === 25) ? "18px" : "12px";
                    if(p==='g') { d.id = 'g'+i; d.style.color = rowColors[Math.floor((i-1)/(currentMax/10))]; }
                    return d;
                };
                let bc = makeCell('b'); if(localStorage.getItem(key)) bc.classList.add('booked');
                bc.onclick = () => { 
                    let v = prompt(i+" ስም:", localStorage.getItem(key)||''); 
                    if(v!==null){ 
                        v===''?localStorage.removeItem(key):localStorage.setItem(key,v); 
                        setupGrids(); 
                    } 
                };
                bg.appendChild(bc); gg.appendChild(makeCell('g'));
            }
        }

        async function runSequence() {
            if(!localStorage.getItem('f_chat_id')) return alert("Setup ገጽ ላይ Chat ID ያስገቡ!");
            document.getElementById('drawBtn').disabled = true;
            document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('winner-hit'));
            winners = [];

            for(let i = 1; i <= 3; i++) {
                renderBall("?", false);
                await new Promise(d => setTimeout(d, 500));
                let start = Date.now();
                while(Date.now() - start < 4000) {
                    let r = Math.floor(Math.random() * currentMax) + 1;
                    resEl.innerText = r; renderBall(r, false);
                    document.querySelectorAll('#gameGrid .grid-cell').forEach(c => c.classList.remove('tracking'));
                    let cell = document.getElementById('g'+r); if(cell) cell.classList.add('tracking');
                    await new Promise(d => setTimeout(d, 60));
                }
                let w; do { w = Math.floor(Math.random() * currentMax) + 1; } while(winners.includes(w));
                winners.push(w); resEl.innerText = w; renderBall(w, true);
                document.getElementById('g'+w).classList.add('winner-hit');
                await sendMsg(`🎯 ${i}ኛ ዕጣ ቁጥር: ${w}\n👤 ስም: ${localStorage.getItem(`bk_${currentMax}_${w}`)||'ያልተመዘገበ'}`);
                await new Promise(d => setTimeout(d, 2000));
            }
            document.getElementById('drawBtn').disabled = false;
        }

        async function sendMsg(text) {
            const t = localStorage.getItem('f_bot_token') || DEFAULT_TOKEN;
            const c = localStorage.getItem('f_chat_id');
            const url = `https://api.telegram.org/bot${t}/sendMessage?chat_id=${c}&text=${encodeURIComponent(text)}`;
            try { await fetch(url); } catch(e){}
        }

        function renderBall(v, f) {
            cx.clearRect(0,0,200,200);
            cx.beginPath(); cx.arc(100,100,90,0,Math.PI*2);
            cx.fillStyle = f ? "#00ff00" : "#222"; cx.fill();
            cx.strokeStyle = "#bf953f"; cx.lineWidth = 5; cx.stroke();
            cx.fillStyle = f ? "#000" : "#fff"; cx.font = "bold 80px Arial"; cx.textAlign = "center";
            cx.fillText(v, 100, 130);
        }

        function showPage(p, btn) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            btn.classList.add('active');
        }

        function saveSettings() {
            localStorage.setItem('f_bot_token', document.getElementById('botTokenInput').value);
            localStorage.setItem('f_chat_id', document.getElementById('chatIdInput').value);
            alert("Settings Saved! ✅");
        }

        function loadSettings() {
            document.getElementById('botTokenInput').value = localStorage.getItem('f_bot_token') || "";
            document.getElementById('chatIdInput').value = localStorage.getItem('f_chat_id') || "";
        }

        function clearBookingData() {
            if(confirm("ሁሉንም የተመዘገቡ ስሞች ማጥፋት ትፈልጋለህ?")) {
                for(let i=1; i<=100; i++) localStorage.removeItem(`bk_${currentMax}_${i}`);
                setupGrids();
            }
        }
    </script>
</body>
</html>
