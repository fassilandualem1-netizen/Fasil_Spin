<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP BINGO FULL</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --red: #ff3333; }
        body { font-family: sans-serif; background: #000; color: var(--gold); text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Lock Screen */
        #lockScreen { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .lock-box { background: #111; padding: 30px; border: 2px solid var(--gold); border-radius: 20px; width: 85%; box-sizing: border-box; }
        .lock-input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 1px solid var(--gold); color: #fff; text-align: center; font-size: 28px; border-radius: 10px; letter-spacing: 5px; }
        
        #appContent { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .page { display: none; flex: 1; padding: 10px; overflow-y: auto; padding-bottom: 90px; }
        .page.active { display: flex; flex-direction: column; }

        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 75px; z-index: 1000; } 
        .tab-btn { flex: 1; color: #777; border: none; background: none; font-weight: bold; font-size: 13px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #1a1a1a; }

        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2.5px; background: #151515; padding: 5px; border-radius: 8px; margin-top: 35px; }
        .grid-cell { background: #0a0a0a; font-size: 10px; font-weight: bold; padding: 7px 0; border: 1px solid #222; border-radius: 3px; }
        #bookingGrid .grid-cell { color: #fff; font-size: 13px; border-color: #333; }
        .booked { border: 1px solid #fff !important; background: #222 !important; }
        .tracking { background: #fff !important; color: #000 !important; transform: scale(1.1); }
        .winner-hit { background: var(--red) !important; color: #fff !important; animation: pulse 0.8s infinite; }
        @keyframes pulse { 50% { transform: scale(1.2); } }

        .res-row { display: flex; justify-content: space-between; margin: 10px 0; }
        .res-card { background: #0a0a0a; border: 1.5px solid var(--gold); padding: 8px; border-radius: 10px; width: 30%; }
        .res-card b { font-size: 28px; color: #fff; display: block; }
        
        canvas { border: 4px solid var(--gold); border-radius: 50%; background: #050505; width: 125px; height: 125px; margin: 5px auto; }
        button#drawBtn { width: 95%; padding: 15px; border-radius: 15px; font-size: 19px; font-weight: bold; background: var(--gold); color: #000; border: none; margin: 5px auto; }
        .h-ball { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 12px; background: var(--gold); }
    </style>
</head>
<body onload="initApp()">

    <div id="lockScreen">
        <div class="lock-box">
            <h2 id="lockStatus">FASIL VIP</h2>
            <p id="trialMsg" style="color:#888; font-size:14px;"></p>
            <input type="password" id="passCode" class="lock-input" placeholder="CODE" maxlength="4">
            <button onclick="checkPass()" style="background:var(--gold); border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold;">UNLOCK</button>
        </div>
    </div>

    <div id="appContent">
        <div id="bookingPage" class="page">
            <h3 style="margin-top:40px;">የተመዘገቡ</h3>
            <div id="bookingGrid" class="grid-container"></div>
            <button style="color:red; background:none; border:1px solid #444; padding:10px; border-radius:10px; margin-top:15px;" onclick="clearData()">ሁሉንም አጽዳ</button>
        </div>

        <div id="gamePage" class="page active">
            <div id="gameGrid" class="grid-container"></div>
            <div class="res-row">
                <div class="res-card"><span>1ኛ</span><b id="v1">?</b></div>
                <div class="res-card"><span>2ኛ</span><b id="v2">?</b></div>
                <div class="res-card"><span>3ኛ</span><b id="v3">?</b></div>
            </div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <button id="drawBtn" onclick="runSequence()">START DRAW</button>
            <button id="resetBtn" onclick="location.reload()" style="display:none; background:#222; color:#fff; padding:12px; border-radius:15px; width:95%; margin:5px auto; border:none;">RE-START</button>
        </div>

        <div id="historyPage" class="page"><div id="historyList"></div></div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">📋 መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">🕒 ታሪክ</button>
        </div>
    </div>

    <script>
        const MASTER_KEY = "9988";
        const BOT_TOKEN = "8757888085:AAG2Gpgdyu_R_TOEtt3f_JU0F-xjmCnSPgc";
        const CHAT_ID = "-1003881429974";
        const TRIAL_DAYS = 5;

        function initApp() {
            let start = localStorage.getItem('f_start');
            if (!start) { start = Date.now(); localStorage.setItem('f_start', start); }
            let days = Math.floor((Date.now() - start) / (86400000));
            
            if (localStorage.getItem('f_ok') === '1' || days < TRIAL_DAYS) {
                if(days < TRIAL_DAYS && localStorage.getItem('f_ok') !== '1') {
                    document.getElementById('trialMsg').innerText = "የሙከራ ጊዜ፡ " + (TRIAL_DAYS - days) + " ቀን ይቀራል";
                }
                unlockApp();
            } else {
                document.getElementById('lockStatus').innerText = "ጊዜው አልቋል!";
            }
            setup();
        }

        function checkPass() {
            if (document.getElementById('passCode').value === MASTER_KEY) {
                localStorage.setItem('f_ok', '1'); unlockApp();
            } else { alert("ስህተት!"); }
        }

        function unlockApp() { document.getElementById('lockScreen').style.display = 'none'; document.getElementById('appContent').style.display = 'flex'; }

        function setup() {
            const bg = document.getElementById('bookingGrid'), gg = document.getElementById('gameGrid');
            bg.innerHTML = ""; gg.innerHTML = "";
            for(let i=1; i<=100; i++) {
                let bc = document.createElement('div'); bc.className = 'grid-cell'; bc.innerText = i;
                if(localStorage.getItem('bk_'+i)) bc.classList.add('booked');
                bc.onclick = () => {
                    let v = prompt(i+" ስም:", localStorage.getItem('bk_'+i)||"");
                    if(v!==null) { if(v.trim()==="") localStorage.removeItem('bk_'+i); else localStorage.setItem('bk_'+i, v); setup(); }
                };
                bg.appendChild(bc);
                let gc = document.createElement('div'); gc.className = 'grid-cell'; gc.id = 'g'+i; gc.innerText = i;
                gg.appendChild(gc);
            }
        }

        function showPage(p, b) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById(p).classList.add('active'); b.classList.add('active');
            if(p==='historyPage') loadHistory();
        }

        async function runSequence() {
            document.getElementById('drawBtn').style.display = 'none';
            let nums = Array.from({length: 100}, (_, i) => i + 1);
            for (let i = nums.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [nums[i], nums[j]] = [nums[j], nums[i]]; }
            let winners = [nums[0], nums[1], nums[2]];

            for(let i=1; i<=3; i++) {
                for(let j=0; j<20; j++) {
                    let r = Math.floor(Math.random()*100)+1;
                    document.getElementById('g'+r).classList.add('tracking');
                    await new Promise(r=>setTimeout(r, 60));
                    document.getElementById('g'+r).classList.remove('tracking');
                }
                document.getElementById('v'+i).innerText = winners[i-1];
                document.getElementById('g'+winners[i-1]).classList.add('winner-hit');
                await new Promise(r=>setTimeout(r, 1000));
            }
            saveHist(winners); sendTele(winners);
            document.getElementById('resetBtn').style.display = 'block';
        }

        function sendTele(w) {
            const n = w.map(x => localStorage.getItem('bk_'+x) || "ያልተመዘገበ");
            const msg = `🎰 የቢንጎ ውጤት 🎰\n🥇 1ኛ: 【${w[0]}】- ${n[0]}\n🥈 2ኛ: 【${w[1]}】- ${n[1]}\n🥉 3ኛ: 【${w[2]}】- ${n[2]}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
        }

        function saveHist(w) {
            let h = JSON.parse(localStorage.getItem('f_h')||"[]");
            h.unshift({t: new Date().toLocaleTimeString(), r: w});
            localStorage.setItem('f_h', JSON.stringify(h.slice(0,10)));
        }

            document.getElementById('historyList').innerHTML = h.map(x =>
