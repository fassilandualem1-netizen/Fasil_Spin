<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP LIGHT</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --red: #ff3333; --neon: #00f2ff; --dark: #000; }
        html, body { overflow: hidden; height: 100vh; width: 100vw; margin: 0; padding: 0; background: var(--dark); font-family: 'Segoe UI', sans-serif; color: var(--gold); }
        #appContent { display: none; height: 100vh; flex-direction: column; }
        .page { display: none; flex: 1; padding: 10px; overflow-y: auto; }
        .page.active { display: flex; flex-direction: column; }
        
        .live-status-bar { display: flex; align-items: center; justify-content: center; background: #111; padding: 5px 15px; border-radius: 50px; border: 1px solid #333; width: fit-content; margin: 15px auto 10px auto; gap: 10px; }
        .blink-dot { width: 10px; height: 10px; background-color: var(--red); border-radius: 50%; animation: live-blink 1s infinite; }
        @keyframes live-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #focusWinnerDisplay { height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #222 0%, #000 70%); border-radius: 20px; border: 1px solid #222; margin-bottom: 5px; }
        .focus-num { font-size: 70px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--neon); }
        
        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; background: #080808; padding: 8px; border-radius: 12px; }
        .grid-cell { background: #050505; border: 1px solid #1a1a1a; border-radius: 4px; text-align: center; font-weight: bold; padding: 10px 0; font-size: 12px; }
        
        .tracking { background: var(--neon) !important; color: #000 !important; }
        .winner-hit { background: var(--red) !important; color: white !important; border: 1.5px solid white !important; }

        canvas { border: 4px solid var(--gold); border-radius: 50%; background: #050505; width: 75px; height: 75px; margin: 5px auto; display: block; }
        button.main-btn { width: 100%; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; background: var(--gold); color: #000; border: none; }
        
        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 70px; }
        .tab-btn { flex: 1; color: #777; background: none; border: none; font-size: 12px; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #1a1a1a; }
    </style>
</head>
<body onload="checkLicense()">

    <div id="lockScreen" style="display:none; position:fixed; inset:0; background:#000; z-index:10000; flex-direction:column; justify-content:center; align-items:center;">
        <div style="background:#111; padding:30px; border:2px solid var(--gold); border-radius:20px; width:80%; text-align:center;">
            <h2 style="color:var(--gold);">FASIL LIGHT</h2>
            <input type="text" id="licenseKey" style="width:90%; padding:14px; text-align:center; background:#000; color:#fff; border:1px solid var(--gold);" placeholder="Key">
            <br><br><button onclick="validateKey()" class="main-btn">ACTIVATE</button>
        </div>
    </div>

    <div id="appContent">
        <div id="gamePage" class="page active">
            <div class="live-status-bar"><div class="blink-dot"></div><div id="liveClock">00:00:00</div></div>
            <div id="focusWinnerDisplay">
                <div id="levelLabel" style="font-size:20px; color:var(--bright-gold);">READY?</div>
                <div class="focus-num" id="currentResult">--</div>
            </div>
            <div id="gameGrid" class="grid-container"></div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <div style="padding:10px 20px;"><button id="drawBtn" class="main-btn" onclick="runSequence()">START DRAW</button></div>
        </div>

        <div id="setupPage" class="page">
            <h3 style="margin-top:20px;">⚙️ SETUP</h3>
            <input type="text" id="botTokenInput" style="width:100%; padding:15px; margin-bottom:15px; background:#111; color:#fff; border:1px solid var(--gold);" placeholder="Bot Token">
            <input type="text" id="chatIdInput" style="width:100%; padding:15px; background:#111; color:#fff; border:1px solid var(--gold);" placeholder="Chat ID">
            <br><br><button class="main-btn" onclick="saveSettings()">SAVE SETTINGS</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('setupPage', this)">⚙️ SETUP</button>
        </div>
    </div>

    <script>
        const DEFAULT_TOKEN = "8757888085:AAG2Gpgdyu_R_TOEtt3f_JU0F-xjmCnSPgc";
        let currentMax = 100, audioCtx = null;
        const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d'), resultEl = document.getElementById('currentResult'), lbl = document.getElementById('levelLabel');

        function checkLicense() {
            if (localStorage.getItem('f_is_premium') === "true") { document.getElementById('appContent').style.display = 'flex'; openApp(); } 
            else { document.getElementById('lockScreen').style.display = 'flex'; }
        }

        function validateKey() { if (document.getElementById('licenseKey').value === "9988") { localStorage.setItem('f_is_premium', "true"); location.reload(); } }

        function openApp() { 
            loadSettings(); setupGrid(); renderBall("?", false); 
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        }

        function setupGrid() {
            const gg = document.getElementById('gameGrid'); gg.innerHTML = "";
            for(let i=1; i<=100; i++){
                let gc = document.createElement('div'); gc.className='grid-cell'; gc.id='g'+i; gc.innerText=i;
                gg.appendChild(gc);
            }
        }

        async function runSequence() {
            const chatId = localStorage.getItem('f_chat_id');
            if(!chatId) return alert("Setup Chat ID!");
            document.getElementById('drawBtn').disabled = true;
            let all = Array.from({length: 100}, (_, i) => i + 1);
            for(let i=all.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [all[i], all[j]]=[all[j], all[i]]; }
            let winners = [all, all, all];

            for(let i=1; i<=3; i++) {
                let win = winners[i-1];
                lbl.innerText = "DRAWING..."; await new Promise(r=>setTimeout(r, 2000));
                renderBall(win, true); resultEl.innerText = win; lbl.innerText = i + "ኛ ዕጣ!";
                document.getElementById('g'+win).classList.add('winner-hit');
                await sendMsg(`🎯 **${i}ኛ ዕጣ፦ [ ${win} ]**`);
                await new Promise(r=>setTimeout(r, 3000));
            }
            alert("ዕጣው ተጠናቋል!"); location.reload();
        }

        function renderBall(v, f) {
            cx.clearRect(0,0,200,200); cx.beginPath(); cx.arc(100,100,85,0,Math.PI*2);
            cx.fillStyle = f ? "#00ff00" : "#222"; cx.fill(); cx.font = "bold 80px Arial"; cx.textAlign = "center";
            cx.fillStyle = f ? "#000" : "#fff"; cx.fillText(v, 100, 130);
        }

        async function sendMsg(m) {
            const t = localStorage.getItem('f_bot_token') || DEFAULT_TOKEN, c = localStorage.getItem('f_chat_id');
            await fetch(`https://api.telegram.org/bot${t}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:c, text:m, parse_mode:'Markdown'}) });
        }

        function showPage(p, b) { 
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); 
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active')); 
            document.getElementById(p).classList.add('active'); b.classList.add('active');
        }
        function saveSettings() { localStorage.setItem('f_bot_token', document.getElementById('botTokenInput').value.trim()); localStorage.setItem('f_chat_id', document.getElementById('chatIdInput').value.trim()); alert("Saved!"); }
        function loadSettings() { document.getElementById('botTokenInput').value = localStorage.getItem('f_bot_token') || ""; document.getElementById('chatIdInput').value = localStorage.getItem('f_chat_id') || ""; }
    </script>
</body>
</html>
