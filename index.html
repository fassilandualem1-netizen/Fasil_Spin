<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP PRO - Secured Enterprise</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --red: #ff3333; --neon: #00f2ff; --dark: #000; }
        html, body { overflow: hidden; height: 100vh; width: 100vw; margin: 0; padding: 0; position: fixed; touch-action: none; background: var(--dark); font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; user-select: none; color: var(--gold); }
        #appContent { display: none; height: 100vh; flex-direction: column; overflow: hidden; }
        .page { display: none; flex: 1; padding: 10px; box-sizing: border-box; overflow-y: auto; background: var(--dark); }
        .page.active { display: flex; flex-direction: column; }
        
        .board-selector { background: #000; padding: 45px 10px 10px 10px; display: flex; justify-content: space-around; gap: 8px; }
        .board-opt { flex: 1; padding: 10px; border: 1px solid #222; border-radius: 10px; font-size: 12px; cursor: pointer; text-align: center; color: #888; background: #0a0a0a; }
        .board-opt.active { border-color: var(--gold); background: var(--gold); color: #000; font-weight: bold; }

        #focusWinnerDisplay { height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #222 0%, #000 70%); border-radius: 20px; border: 1px solid #222; margin-bottom: 5px; }
        .focus-num { font-size: 70px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--neon); line-height: 1; }
        
        .grid-container { display: grid; gap: 4px; background: #080808; padding: 8px; border-radius: 12px; border: 1px solid #222; }
        .grid-cell { background: #050505; border: 1px solid #1a1a1a; border-radius: 4px; text-align: center; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        
        .tracking { background: var(--neon) !important; color: #000 !important; box-shadow: 0 0 10px var(--neon); }
        .booked { border: 1.5px solid #fff !important; background: #333 !important; color: #fff !important; }
        .winner-hit { background: var(--red) !important; color: white !important; border: 1.5px solid white !important; box-shadow: 0 0 15px var(--red); z-index: 5; }

        canvas { border: 4px solid var(--gold); border-radius: 50%; background: #050505; width: 85px; height: 85px; margin: 5px auto; display: block; }
        button.main-btn { width: 100%; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; background: var(--gold); color: #000; border: none; cursor: pointer; }
        
        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 75px; z-index: 1000; }
        .tab-btn { flex: 1; color: #777; border: none; background: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #1a1a1a; }
        
        #finalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body onload="checkLicense()">

    <div id="finalOverlay">
        <div style="background:#111; border:2px solid var(--gold); border-radius:20px; width:85%; padding:25px; text-align:center;">
            <h2 style="color:var(--gold);">🏆 የዕጣ ማጠቃለያ</h2>
            <div id="finalList" style="text-align:left; color:white; margin:20px 0;"></div>
            <button class="main-btn" onclick="clearSessionAndReload()">ጨርሻለሁ</button>
        </div>
    </div>

    <div id="lockScreen" style="display:none; position:fixed; inset:0; background:#000; z-index:10000; flex-direction:column; justify-content:center; align-items:center;">
        <div style="background:#111; padding:30px; border:2px solid var(--gold); border-radius:20px; width:80%; text-align:center;">
            <h2 style="color:var(--gold);">FASIL VIP</h2>
            <div id="myDeviceId" style="color:#fff; margin:15px 0; font-family:monospace; background:#000; padding:10px;">---</div>
            <input type="text" id="licenseKey" style="width:90%; padding:14px; text-align:center; border-radius:8px; background:#000; color:#fff; border:1px solid var(--gold);" placeholder="Activation Key">
            <br><br><button onclick="validateKey()" class="main-btn">ACTIVATE SYSTEM</button>
        </div>
    </div>

    <div id="appContent">
        <div class="board-selector">
            <div class="board-opt active" id="opt25" onclick="changeBoard(25)">1-25</div>
            <div class="board-opt" id="opt50" onclick="changeBoard(50)">1-50</div>
            <div class="board-opt" id="opt100" onclick="changeBoard(100)">1-100</div>
        </div>

        <div id="gamePage" class="page active">
            <div id="focusWinnerDisplay">
                <div id="levelLabel" style="font-size:20px; color:var(--bright-gold);">READY?</div>
                <div class="focus-num" id="currentResult">--</div>
            </div>
            <div id="gameGrid" class="grid-container"></div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <div style="padding:10px 20px 85px 20px;"><button id="drawBtn" class="main-btn" onclick="runSequence()">START DRAW</button></div>
        </div>

        <div id="bookingPage" class="page">
            <h3>📋 መዝገብ</h3>
            <div id="bookingGrid" class="grid-container" style="padding-bottom:100px;"></div>
            <button onclick="clearBookingOnly()" style="color:red; background:none; border:1px solid #444; padding:12px; width:100%; border-radius:10px;">ሁሉንም አፅዳ</button>
        </div>

        <div id="setupPage" class="page">
            <h3>⚙️ SETUP</h3>
            <input type="text" id="botTokenInput" style="width:100%; padding:15px; margin-bottom:15px; background:#111; color:#fff; border:1px solid var(--gold); border-radius:10px;" placeholder="Bot Token">
            <input type="text" id="chatIdInput" style="width:100%; padding:15px; background:#111; color:#fff; border:1px solid var(--gold); border-radius:10px;" placeholder="Chat ID">
            <br><br><button class="main-btn" onclick="saveSettings()">SAVE SETTINGS</button>
        </div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">📋 መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('setupPage', this)">⚙️ SETUP</button>
        </div>
    </div>

    <script>
        const DEFAULT_TOKEN = "8757888085:AAG2Gpgdyu_R_TOEtt3f_JU0F-xjmCnSPgc";
        const rowColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"];
        let currentMax = 25, audioCtx = null;
        const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d'), resultEl = document.getElementById('currentResult');

        function playSound(f, t, d, v=2.0) { 
            try { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.type=t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); } catch(e){} 
        }

        function checkLicense() {
            let uid = localStorage.getItem('f_uid') || "FS-" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('f_uid', uid); document.getElementById('myDeviceId').innerText = uid;
            if (localStorage.getItem('f_is_premium') === "true") { document.getElementById('appContent').style.display = 'flex'; openApp(); } 
            else { document.getElementById('lockScreen').style.display = 'flex'; }
        }

        function validateKey() { if (document.getElementById('licenseKey').value === "9988") { localStorage.setItem('f_is_premium', "true"); location.reload(); } }

        function openApp() { loadSettings(); setupGrids(); renderBall("?", false); if(localStorage.getItem('f_temp_winners')) { document.getElementById('drawBtn').innerText = "RESUME DRAW"; document.getElementById('drawBtn').style.background = "#ff3333"; } }

        function changeBoard(max) { currentMax = max; document.querySelectorAll('.board-opt').forEach(el => el.classList.remove('active')); document.getElementById('opt' + max).classList.add('active'); setupGrids(); }

        function setupGrids() {
            const bg = document.getElementById('bookingGrid'), gg = document.getElementById('gameGrid');
            bg.innerHTML = ""; gg.innerHTML = "";
            let cols = (currentMax === 25) ? 5 : (currentMax === 50 ? 6 : 8);
            bg.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            gg.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            for(let i=1; i<=currentMax; i++){
                let k = `bk_${currentMax}_${i}`, bc = document.createElement('div'); bc.className='grid-cell'; bc.innerText=i;
                if(localStorage.getItem(k)) bc.classList.add('booked');
                bc.onclick=()=>{ let v=prompt(i+" ስም:", localStorage.getItem(k)||""); if(v!==null){ v===""?localStorage.removeItem(k):localStorage.setItem(k,v); setupGrids(); } };
                bg.appendChild(bc);
                let gc = document.createElement('div'); gc.className='grid-cell'; gc.id='g'+i; gc.innerText=i;
                gc.style.color = rowColors[Math.floor((i-1)/(currentMax/10))]; gg.appendChild(gc);
                if(currentMax === 25) { gc.style.padding = "15px 0"; gc.style.fontSize = "18px"; bc.style.padding = "15px 0"; }
                else if(currentMax === 50) { gc.style.padding = "12px 0"; gc.style.fontSize = "15px"; bc.style.padding = "12px 0"; }
            }
        }

        async function runSequence() {
            if(!localStorage.getItem('f_chat_id')) return alert("Setup Chat ID!");
            document.getElementById('drawBtn').disabled = true;
            
            let winners = JSON.parse(localStorage.getItem('f_temp_winners'));
            if(!winners) {
                let all = Array.from({length: currentMax}, (_, i) => i + 1);
                for(let i=all.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [all[i], all[j]]=[all[j], all[i]]; }
                winners = [all[0], all[1], all[2]];
                localStorage.setItem('f_temp_winners', JSON.stringify(winners));
                await sendMsg(`🚀 **FASIL VIP PRO BINGO** 🚀\n🔔 **ዕጣው አሁን እየወጣ ነው...** 📡`);
            }

            let startFrom = parseInt(localStorage.getItem('f_draw_step')) || 1;
            for(let i=startFrom; i<=3; i++) {
                let win = winners[i-1];
                localStorage.setItem('f_draw_step', i);
                document.getElementById('levelLabel').innerText = "READY?"; await new Promise(r=>setTimeout(r, 1500));
                
                let startTime = Date.now();
                while(Date.now() - startTime < 5000) {
                    let rand = Math.floor(Math.random()*currentMax)+1;
                    renderBall(rand, false); resultEl.innerText = rand;
                    document.querySelectorAll('#gameGrid .grid-cell').forEach(c => c.classList.remove('tracking'));
                    if(document.getElementById('g'+rand)) document.getElementById('g'+rand).classList.add('tracking');
                    playSound(Math.random()*600+200, 'triangle', 0.1, 1.5);
                    await new Promise(r=>setTimeout(r, 80));
                }
                
                document.querySelectorAll('#gameGrid .grid-cell').forEach(c => c.classList.remove('tracking'));
                renderBall(win, true); resultEl.innerText = win;
                document.getElementById('levelLabel').innerText = i + "ኛ ዕጣ";
                document.getElementById('g'+win).classList.add('winner-hit', 'tracking');
                
                const name = localStorage.getItem(`bk_${currentMax}_${win}`) || "ያልተመዘገበ";
                await sendMsg(`🎯 **${i}ኛ ዕጣ የወጣው ቁጥር፦ [ ${win} ]**\n👤 ስም፦ ${name}`);
                playSound(660, 'sawtooth', 0.8, 2.5);
                await new Promise(r=>setTimeout(r, 3000));
            }
            showFinalSummary(winners);
        }

        function showFinalSummary(w) {
            const list = document.getElementById('finalList');
            list.innerHTML = w.map((num, i) => `<div>${i+1}ኛ፡ <b>${num}</b> (${localStorage.getItem(`bk_${currentMax}_${num}`) || "ያልተመዘገበ"})</div>`).join('<br>');
            document.getElementById('finalOverlay').style.display = 'flex';
            let msg = `🏆 **የዕጣው ማጠቃለያ (Final Results)** 🏆\n` + w.map((n,i)=>`${i+1}ኛ፡ ${n} (${localStorage.getItem(`bk_${currentMax}_${n}`)||'ያልተመዘገበ'})`).join('\n');
            sendMsg(msg);
        }

        function clearSessionAndReload() { localStorage.removeItem('f_temp_winners'); localStorage.removeItem('f_draw_step'); location.reload(); }

        function renderBall(v, f) {
            cx.clearRect(0,0,200,200);
            cx.beginPath(); cx.arc(100,100,85,0,Math.PI*2);
            cx.fillStyle = f ? "#00ff00" : "#222"; cx.fill();
            cx.strokeStyle = "#bf953f"; cx.lineWidth = 5; cx.stroke();
            cx.fillStyle = f ? "#000" : "#fff"; cx.font = "bold 80px Arial"; cx.textAlign = "center";
            cx.fillText(v, 100, 130);
        }

        async function sendMsg(m) {
            const t = localStorage.getItem('f_bot_token') || DEFAULT_TOKEN, c = localStorage.getItem('f_chat_id');
            if(!c) return;
            await fetch(`https://api.telegram.org/bot${t}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:c, text:m, parse_mode:'Markdown'}) });
        }

        function showPage(p, b) { document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active')); document.getElementById(p).classList.add('active'); b.classList.add('active'); }
        function saveSettings() { localStorage.setItem('f_bot_token', document.getElementById('botTokenInput').value.trim()); localStorage.setItem('f_chat_id', document.getElementById('chatIdInput').value.trim()); alert("Settings Saved! ✅"); }
        function loadSettings() { document.getElementById('botTokenInput').value = localStorage.getItem('f_bot_token') || ""; document.getElementById('chatIdInput').value = localStorage.getItem('f_chat_id') || ""; }
        function clearBookingOnly() { if(confirm("መዝገብ ላጥፋ?")){ for(let i=1; i<=100; i++) localStorage.removeItem(`bk_${currentMax}_${i}`); setupGrids(); } }
    </script>
</body>
</html>
