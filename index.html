<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP - Color Master</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --dark-gold: #8a6d29; }
        body { font-family: sans-serif; background: #000; color: var(--gold); text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #appContent { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .page { display: none; flex: 1; padding: 10px; overflow-y: auto; box-sizing: border-box; padding-bottom: 90px; }
        .page.active { display: flex; flex-direction: column; }

        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 75px; z-index: 1000; } 
        .tab-btn { flex: 1; color: #777; border: none; background: none; font-weight: bold; font-size: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #1a1a1a; }

        .live-box { background: #111; border: 1px solid var(--gold); padding: 6px; border-radius: 10px; width: 85%; align-self: center; display: flex; justify-content: center; align-items: center; color: #fff; margin-top: 40px; margin-bottom: 5px; gap: 8px; font-size: 14px; }
        .live-dot { width: 8px; height: 8px; background: red; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        /* የቀለማት ሰንጠረዥ */
        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; background: #000; padding: 6px; border-radius: 10px; width: 100%; margin: 5px 0; }
        .grid-cell { 
            background: #111; 
            color: #fff; 
            font-size: 11px; 
            font-weight: bold; 
            padding: 8px 0; 
            border-radius: 4px; 
            border: 1px solid #222;
            transition: all 0.2s;
        }

        /* ዕጣው ሲሽከረከር የሚታይ Live Tracking */
        .tracking { background: #fff !important; color: #000 !important; transform: scale(1.2); z-index: 5; box-shadow: 0 0 15px #fff; }

        /* ዕጣው ሲወጣ የሚሆን አኒሜሽን */
        .winner-hit { 
            background: #ff0000 !important; 
            color: #fff !important; 
            box-shadow: 0 0 20px #ff0000;
            animation: pulse 0.6s infinite alternate;
            border: 2px solid #fff !important;
        }
        @keyframes pulse { from { transform: scale(1.1); } to { transform: scale(1.3); } }

        /* መዝገብ ላይ ስም ያላቸው ቁጥሮች */
        .booked { border: 2px solid var(--gold) !important; box-shadow: inset 0 0 5px var(--gold); }

        .res-row { display: flex; justify-content: space-between; margin: 10px 0; gap: 6px; }
        .res-card { background: #111; border: 2px solid var(--gold); padding: 8px; border-radius: 12px; width: 32%; }
        .res-card b { font-size: 28px; color: #fff; display: block; }

        canvas { border: 5px solid var(--gold); border-radius: 50%; background: #050505; width: 120px; height: 120px; margin: 5px auto; box-shadow: 0 0 25px rgba(191,149,63,0.5); }
        button#drawBtn { width: 95%; padding: 16px; border-radius: 15px; font-size: 20px; font-weight: bold; background: var(--gold); color: #000; border: none; margin: 10px auto; }
    </style>
</head>
<body onload="checkAccess()">

    <div id="appContent">
        <div id="gamePage" class="page active">
            <div class="live-box">
                <div class="live-dot"></div>
                <span style="font-weight:bold; color:red;">LIVE COLOR TRACKING</span>
                <span id="liveClock">00:00:00</span>
            </div>
            
            <div id="gameGrid" class="grid-container"></div>
            
            <div class="res-row">
                <div class="res-card"><span>1ኛ</span><b id="v1">?</b></div>
                <div class="res-card"><span>2ኛ</span><b id="v2">?</b></div>
                <div class="res-card"><span>3ኛ</span><b id="v3">?</b></div>
            </div>
            
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <button id="drawBtn" onclick="startSequence()">START DRAW</button>
            <button id="resetBtn" onclick="location.reload()" style="display:none; background:#222; color:#fff; padding:15px; border-radius:15px; border:1px solid #444; width:95%; margin:10px auto;">RE-START</button>
        </div>
    </div>

    <script>
        // ለእያንዳንዱ 10 ቁጥሮች የተለየ ቀለም መስጠት
        const rowColors = [
            "#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8",
            "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"
        ];

        function setup() {
            const gg = document.getElementById('gameGrid');
            gg.innerHTML = "";
            for(let i=1; i<=100; i++) {
                let gc = document.createElement('div');
                gc.className = 'grid-cell';
                gc.id = 'g'+i;
                gc.innerText = i;
                
                // ቁጥሮችን በቀለም ማሸብረቅ
                let colorIndex = Math.floor((i-1) / 10);
                gc.style.borderColor = rowColors[colorIndex];
                gc.style.color = rowColors[colorIndex];
                
                if(localStorage.getItem('bk_'+i)) gc.classList.add('booked');
                gg.appendChild(gc);
            }
        }

        async function startSequence() {
            document.getElementById('drawBtn').style.display = 'none';
            let winners = []; while(winners.length < 3) { let r = Math.floor(Math.random()*100)+1; if(!winners.includes(r)) winners.push(r); }
            
            for(let i=1; i<=3; i++) {
                let win = winners[i-1];
                // Live Tracking Animation
                for(let j=0; j<20; j++) {
                    let temp = Math.floor(Math.random()*100)+1;
                    let cell = document.getElementById('g'+temp);
                    cell.classList.add('tracking');
                    await new Promise(r=>setTimeout(r, 60));
                    cell.classList.remove('tracking');
                }
                
                document.getElementById('v'+i).innerText = win;
                document.getElementById('g'+win).classList.add('winner-hit');
                await new Promise(r=>setTimeout(r, 1200));
            }
            document.getElementById('resetBtn').style.display = 'block';
        }

        function checkAccess() {
            setup();
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
            renderBall(0, true);
        }

        function renderBall(val, final) {
            const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d');
            cx.clearRect(0,0,200,200);
            let g = cx.createRadialGradient(70,70,10,100,100,80);
            g.addColorStop(0,'#fff'); g.addColorStop(1,varColors(val));
            cx.beginPath(); cx.arc(100,100,85,0,Math.PI*2); cx.fillStyle=g; cx.fill();
            cx.fillStyle="#000"; cx.font="bold 75px Arial"; cx.textAlign="center"; cx.fillText(val||"?",100,125);
        }

        function varColors(v) { return v > 0 ? rowColors[Math.floor((v-1)/10)] : "#bf953f"; }
    </script>
</body>
</html>
