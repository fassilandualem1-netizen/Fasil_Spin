<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP - History Edition</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; }
        body { font-family: sans-serif; background: #000; color: var(--gold); text-align: center; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        
        #appContent { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .page { display: none; flex: 1; padding: 10px; overflow-y: auto; box-sizing: border-box; padding-bottom: 90px; }
        .page.active { display: flex; flex-direction: column; }

        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 75px; z-index: 1000; } 
        .tab-btn { flex: 1; color: #777; border: none; background: none; font-weight: bold; font-size: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #1a1a1a; }

        /* የታሪክ ካርድ ዲዛይን */
        .history-card { 
            background: #111; 
            border: 1px solid #333; 
            margin: 12px auto; 
            padding: 15px; 
            border-radius: 15px; 
            width: 90%; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-left: 5px solid var(--gold);
        }
        .history-time { font-size: 12px; color: #888; display: block; margin-bottom: 10px; text-align: left; }
        
        /* የታሪክ ኳሶች ዲዛይን */
        .ball-container { display: flex; justify-content: space-around; align-items: center; }
        .h-ball { 
            width: 45px; height: 45px; 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 18px; color: #000;
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.4), 2px 4px 6px rgba(0,0,0,0.3);
            position: relative;
        }
        .h-ball::after { /* የብርሃን ነጥብ በኳሱ ላይ */
            content: ''; position: absolute; top: 5px; left: 8px; 
            width: 12px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 50%;
        }
        .ball-label { font-size: 10px; color: var(--gold); margin-top: 5px; display: block; }
        .ball-wrapper { text-align: center; }

        /* ለዕጣ ገፅ የሚያገለግል */
        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; padding: 6px; }
        .grid-cell { background: #111; color: #fff; font-size: 11px; font-weight: bold; padding: 8px 0; border-radius: 4px; border: 1px solid #222; }
        .res-row { display: flex; justify-content: space-between; margin: 10px 0; gap: 6px; }
        .res-card { background: #111; border: 2px solid var(--gold); padding: 8px; border-radius: 12px; width: 32%; }
        canvas { border: 5px solid var(--gold); border-radius: 50%; background: #050505; width: 120px; height: 120px; margin: 5px auto; }
        button#drawBtn { width: 95%; padding: 16px; border-radius: 15px; background: var(--gold); color: #000; border: none; font-weight: bold; }
    </style>
</head>
<body onload="checkAccess()">

    <div id="appContent">
        <div id="gamePage" class="page active">
            <h3 style="margin-top:40px;">LIVE DRAW</h3>
            <div id="gameGrid" class="grid-container"></div>
            <div class="res-row">
                <div class="res-card"><span>1ኛ</span><b id="v1">?</b></div>
                <div class="res-card"><span>2ኛ</span><b id="v2">?</b></div>
                <div class="res-card"><span>3ኛ</span><b id="v3">?</b></div>
            </div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <button id="drawBtn" onclick="startDraw()">START DRAW</button>
        </div>

        <div id="historyPage" class="page">
            <h3 style="margin-top:40px;">የዕጣ ታሪክ</h3>
            <div id="historyList"></div>
            <button onclick="clearHistory()" style="color:red; background:none; border:1px solid #444; padding:10px; border-radius:10px; margin-top:20px;">ታሪክ አጽዳ</button>
        </div>
        
        <div id="bookingPage" class="page">
            <h3 style="margin-top:40px;">መዝገብ</h3>
            <div id="bookingGrid" class="grid-container"></div>
        </div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">📋 መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">🕒 ታሪክ</button>
        </div>
    </div>

    <script>
        const rowColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"];

        function getBallColor(v) {
            return rowColors[Math.floor((v - 1) / 10)] || "#bf953f";
        }

        function showPage(p, b) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById(p).classList.add('active'); b.classList.add('active');
            if(p==='historyPage') loadHistory();
        }

        function loadHistory() {
            const list = document.getElementById('historyList');
            const data = JSON.parse(localStorage.getItem('fasil_history') || "[]");
            
            if(data.length === 0) {
                list.innerHTML = "<p style='color:#666; margin-top:50px;'>ምንም የተመዘገበ ታሪክ የለም።</p>";
                return;
            }

            list.innerHTML = data.map(item => `
                <div class="history-card">
                    <span class="history-time">🕒 ሰዓት: ${item.time}</span>
                    <div class="ball-container">
                        <div class="ball-wrapper">
                            <div class="h-ball" style="background: radial-gradient(circle at 30% 30%, #fff, ${getBallColor(item.results[0])})">
                                ${item.results[0]}
                            </div>
                            <span class="ball-label">1ኛ ዕጣ</span>
                        </div>
                        <div class="ball-wrapper">
                            <div class="h-ball" style="background: radial-gradient(circle at 30% 30%, #fff, ${getBallColor(item.results[1])})">
                                ${item.results[1]}
                            </div>
                            <span class="ball-label">2ኛ ዕጣ</span>
                        </div>
                        <div class="ball-wrapper">
                            <div class="h-ball" style="background: radial-gradient(circle at 30% 30%, #fff, ${getBallColor(item.results[2])})">
                                ${item.results[2]}
                            </div>
                            <span class="ball-label">3ኛ ዕጣ</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ዕጣውን ለማስጀመር (አሳጥሬዋለሁ ለሙከራ)
        async function startDraw() {
            let wins = []; while(wins.length < 3) { let r = Math.floor(Math.random()*100)+1; if(!wins.includes(r)) wins.push(r); }
            for(let i=1; i<=3; i++) {
                document.getElementById('v'+i).innerText = wins[i-1];
                await new Promise(r=>setTimeout(r, 500));
            }
            saveHistory(wins);
            alert("ዕጣ ወጥቷል! ታሪክ ገፅ ላይ ማየት ይችላሉ።");
        }

        function saveHistory(results) {
            let h = JSON.parse(localStorage.getItem('fasil_history') || "[]");
            h.unshift({ time: new Date().toLocaleTimeString('en-GB'), results: results });
            localStorage.setItem('fasil_history', JSON.stringify(h.slice(0, 20)));
        }

        function clearHistory() {
            if(confirm("ሁሉንም የታሪክ መዝገብ ማጥፋት ትፈልጋለህ?")) {
                localStorage.removeItem('fasil_history');
                loadHistory();
            }
        }

        function checkAccess() {
            // ለዕጣ ገፁ ሰንጠረዥ ማዘጋጃ
            const gg = document.getElementById('gameGrid');
            for(let i=1; i<=100; i++) {
                let gc = document.createElement('div');
                gc.className = 'grid-cell';
                gc.innerText = i;
                gc.style.borderColor = rowColors[Math.floor((i-1)/10)];
                gg.appendChild(gc);
            }
        }
    </script>
</body>
</html>
