<!DOCTYPE html>
<html>
<body style="background:#000; color:gold; text-align:center; padding:50px; font-family:sans-serif;">
    <h2>FASIL VIP - Database Connection Test</h2>
    <div id="status" style="font-size: 20px;">በመሞከር ላይ...</div>
    <div id="details" style="margin-top:20px; color:#888;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = "https://hpdhhomunbpcluuhmila.supabase.co";
        // ከፎቶው ያገኘሁት ትክክለኛው Key
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhwZGhob211bmJwY2x1dWhtaWxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNDM2MDcsImV4cCI6MjA4ODgxOTYwN30.EIDhhsFaR6Qw5VVobmQs5JYlbJaDBjxWf_F7kM-jEn0";

        async function checkDB() {
            const statusEl = document.getElementById('status');
            const detailEl = document.getElementById('details');
            
            try {
                const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
                const { data, error } = await supabaseClient.from('bingo_live').select('*').eq('id', 1);

                if (error) {
                    statusEl.innerText = "❌ ስህተት አለ!";
                    statusEl.style.color = "red";
                    detailEl.innerText = "Error: " + error.message;
                } else if (data && data.length > 0) {
                    statusEl.innerText = "✅ ስኬት! ዳታቤዙ በሚገባ ተገናኝቷል!";
                    statusEl.style.color = "lightgreen";
                    detailEl.innerText = "የተገኘ ዳታ፡ " + JSON.stringify(data[0]);
                } else {
                    statusEl.innerText = "⚠️ ተገናኝቷል ግን ዳታው አልተገኘም!";
                    detailEl.innerText = "እባክህ id=1 የሆነ Row መኖሩን አረጋግጥ።";
                }
            } catch (err) {
                statusEl.innerText = "❌ ከባድ ስህተት!";
                detailEl.innerText = err.message;
            }
        }
        checkDB();
    </script>
</body>
