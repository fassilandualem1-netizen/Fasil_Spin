<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FASIL VIP PRO</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --dark-gold: #8a6d29; }
        body { font-family: sans-serif; background: #000; color: var(--gold); text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #lockScreen { position: fixed; inset: 0; background: #000; z-index: 100001; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .lock-box { border: 2px solid var(--gold); padding: 25px; border-radius: 20px; background: #0a0a0a; width: 80%; }
        input[type="number"] { width: 80%; padding: 12px; text-align: center; font-size: 22px; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: #fff; margin-top: 15px; }
        #statusOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100002; display: none; justify-content: center; align-items: center; font-size: 55px; font-weight: bold; color: var(--bright-gold); }

        .tabs { display: flex; background: #111; border-top: 3px solid var(--gold); position: fixed; bottom: 0; width: 100%; z-index: 1000; height: 70px; } 
        .tab-btn { flex: 1; padding: 10px; color: #888; border: none; background: none; font-weight: bold; font-size: 16px; }
        .tab-btn.active { color: #fff; border-top: 5px solid var(--bright-gold); background: #1a1a1a; font-size: 18px; }

        .page { display: none; padding: 15px 8px; flex: 1; box-sizing: border-box; flex-direction: column; overflow-y: auto; padding-bottom: 85px; }
        .page.active { display: flex; }

        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; background: #1a1a1a; padding: 8px; border-radius: 8px; width: 100%; margin-top: 15px; }
        .grid-cell { background: #050505; color: var(--gold); font-size: 11px; font-weight: bold; padding: 10px 0; border: 1px solid #222; border-radius: 4px; }
        .booked { background: linear-gradient(135deg, var(--gold), var(--dark-gold)) !important; color: #000 !important; }
        .active-hit { background: red !important; color: #fff !important; }

        canvas { border: 4px solid var(--gold); border-radius: 50%; background: #050505; width: 140px; height: 140px; margin: 10px auto; }
        button#drawBtn { width: 95%; padding: 16px; border-radius: 15px; font-size: 20px; font-weight: bold; background: var(--gold); color: #000; border: none; margin: 10px auto; }
        .clear-btn { color: #ff4444; border: 1px solid #444; background: none; padding: 12px; border-radius: 12px; margin-top: 25px; font-weight: bold; width: 70%; align-self: center; }

        .history-card { background: #111; border: 1px solid #333; margin: 10px 0; padding: 15px; text-align: left; border-left: 5px solid var(--gold); border-radius: 12px; }
        .h-ball { background: var(--gold); color: #000; width: 35px; height: 35px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body onload="checkSecurity()">

    <div id="lockScreen">
        <div class="lock-box">
            <h2 id="lockTitle">FASIL VIP</h2>
            <div id="requestCode" style="font-size:35px; color:#fff; margin:15px 0; font-weight:bold;">----</div>
            <p id="lockMsg" style="font-size: 12px; color: #888;">ለማግበር ኮድ ያስገቡ</p>
            <input type="number" id="activationKey" placeholder="ኮድ ያስገቡ">
            <button onclick="handleActivation()" style="margin-top:20px; padding:12px 40px; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">አግብር</button>
        </div>
    </div>

    <div id="statusOverlay">READY</div>

    <div id="appContent" style="display:none; flex:1; flex-direction:column;">
        <div id="bookingPage" class="page">
            <div id="bookingGrid" class="grid-container"></div>
            <button class="clear-btn" onclick="safeClear()">ሁሉንም አጽዳ</button>
        </div>
        
        <div id="gamePage" class="page active">
            <div style="background:#111; padding:5px; border-radius:5px; margin-bottom:10px;">LIVE: <span id="liveClock">00:00:00</span></div>
            <div id="gameGrid" class="grid-container"></div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <button id="drawBtn" onclick="initiateDraw()">START DRAW</button>
            <button id="resetBtn" onclick="resetGame()" style="display:none; background:#111; color:#fff; padding:15px; border-radius:12px; border:1px solid #444; width:95%; margin:10px auto;">RE-START</button>
        </div>

        <div id="historyPage" class="page"><div id="historyList"></div></div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">ታሪክ</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const reqNum = Math.floor(1000 + Math.random() * 8000);
        document.getElementById('requestCode').innerText = reqNum;

        function checkSecurity() {
            // የመጀመሪያ ቀን መዝገብ (አጽዳ ቢባል እንኳን እንዳይጠፋ)
            if (!localStorage.getItem('_sys_init_d')) {
                localStorage.setItem('_sys_init_d', Date.now());
            }

            const initDate = parseInt(localStorage.getItem('_sys_init_d'));
            const daysPassed = (Date.now() - initDate) / (1000 * 60 * 60 * 24);

            if (daysPassed > 5) {
                // ከ 5 ቀን በኋላ ከተቆለፈ
                if (localStorage.getItem('fasil_pro_active') !== 'true') {
                    document.getElementById('lockTitle').innerText = "TRIAL EXPIRED";
                    document.getElementById('lockMsg').innerText = "የ 5 ቀን ነፃ ጊዜ አልቋል! Master Key ያስገቡ።";
                } else {
                    initApp();
                }
            } else {
                // ገና በ 5 ቀን ውስጥ ከሆነ
                if (localStorage.getItem('fasil_first_open') === 'true') {
                    initApp();
                }
            }
            
            setup();
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString(); }, 1000);
        }

        function handleActivation() {
            const input = parseInt(document.getElementById('activationKey').value);
            const initDate = parseInt(localStorage.getItem('_sys_init_d'));
            const daysPassed = (Date.now() - initDate) / (1000 * 60 * 60 * 24);

            if (daysPassed > 5) {
                // ከ 5 ቀን በኋላ የግድ 9988 ያስፈልጋል
                if (input === 9988) {
                    localStorage.setItem('fasil_pro_active', 'true');
                    initApp();
                } else { alert("የተሳሳተ Master Code!"); }
            } else {
                // የመጀመሪያ ጊዜ በፎርሙላው ወይም በ 9988 ይከፈታል
                if (input === reqNum * 2 || input === 9988) {
                    localStorage.setItem('fasil_first_open', 'true');
                    initApp();
                } else { alert("የተሳሳተ ኮድ!"); }
            }
        }

        function initApp() { 
            document.getElementById('lockScreen').style.display='none'; 
            document.getElementById('appContent').style.display='flex'; 
        }

        function setup() {
            const bg = document.getElementById('bookingGrid'), gg = document.getElementById('gameGrid');
            bg.innerHTML = ""; gg.innerHTML = "";
            for(let i=1; i<=100; i++) {
                let bc = document.createElement('div'); bc.className = 'grid-cell'; bc.innerText = i;
                if(localStorage.getItem('bk_'+i)) bc.classList.add('booked');
                bc.onclick = () => {
                    let v = prompt(i+" ስም/ስልክ:", localStorage.getItem('bk_'+i)||"");
                    if(v!==null) { if(v.trim()==="") localStorage.removeItem('bk_'+i); else localStorage.setItem('bk_'+i, v); setup(); }
                };
                bg.appendChild(bc);
                let gc = document.createElement('div'); gc.className = 'grid-cell'; gc.id = 'g'+i; gc.innerText = i; gg.appendChild(gc);
            }
        }

        function safeClear() {
            if(confirm("መዝገብና ታሪክ ይጥፋ?")) {
                Object.keys(localStorage).forEach(key => {
                    // ከ _sys_ ጋር የሚጀምሩትን (ቀኑን) እና አክቲቬሽኑን አይነካም
                    if(key.startsWith('bk_') || key === 'fasil_history') localStorage.removeItem(key);
                });
                setup();
                location.reload();
            }
        }

        function playBeep(f, d, v=0.1) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = f; g.gain.value = v;
            o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d);
            o.stop(audioCtx.currentTime + d);
        }

        function showPage(p, b) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            b.classList.add('active');
            if(p==='historyPage') loadHistory();
        }

        const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d');
        function renderBalls(val, isFinal) {
            cx.clearRect(0,0,200,200);
            let dVal = isFinal ? val : Math.floor(Math.random()*100)+1;
            cx.beginPath(); cx.arc(100,100,70,0,Math.PI*2); cx.fillStyle="#bf953f"; cx.fill();
            cx.fillStyle="#000"; cx.font="bold 50px Arial"; cx.textAlign="center"; cx.fillText(dVal||"?", 100, 118);
        }

        async function initiateDraw() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('drawBtn').style.display = 'none';
            const overlay = document.getElementById('statusOverlay');
            overlay.style.display = 'flex';
            const ss = ["READY", "VERIFYING", "GO!"];
            for(let i=0; i<ss.length; i++) { 
                overlay.innerText = ss[i]; playBeep(400+i*100, 0.6, 0.2); 
                await new Promise(r=>setTimeout(r,800)); 
            }
            overlay.style.display = 'none';
            startDraw();
        }

        async function startDraw() {
            let wins = [];
            while(wins.length < 3) { let r = Math.floor(Math.random()*100)+1; if(!wins.includes(r)) wins.push(r); }
            for(let i=1; i<=3; i++) {
                for(let j=0; j<12; j++) { renderBalls(0,false); playBeep(800,0.05,0.05); await new Promise(r=>setTimeout(r,80)); }
                let w = wins[i-1];
                renderBalls(w, true); playBeep(600, 0.6, 0.2);
                document.getElementById('g'+w).classList.add('active-hit');
                await new Promise(r=>setTimeout(r,1000));
            }
            saveHistory(wins);
            document.getElementById('resetBtn').style.display = 'block';
        }

        function resetGame() {
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('drawBtn').style.display = 'block';
            document.querySelectorAll('#gameGrid .grid-cell').forEach(c=>c.classList.remove('active-hit'));
            renderBalls(0, true);
        }

        function saveHistory(w) {
            let h = JSON.parse(localStorage.getItem('fasil_history')||"[]");
            h.unshift({time: new Date().toLocaleTimeString(), res: w});
            localStorage.setItem('fasil_history', JSON.stringify(h.slice(0,20)));
        }

        function loadHistory() {
            let h = JSON.parse(localStorage.getItem('fasil_history')||"[]");
            document.getElementById('historyList').innerHTML = h.map(x => `
                <div class="history-card">
                    <small>${x.time}</small><br>
                    <div style="margin-top:5px;">
                        <div class="h-ball">${x.res[0]}</div>
                        <div class="h-ball">${x.res[1]}</div>
                        <div class="h-ball">${x.res[2]}</div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
