<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP BINGO - TELEGRAM OK</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --red: #ff3333; }
        body { font-family: sans-serif; background: #000; color: var(--gold); text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #statusOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; justify-content: center; align-items: center; font-size: 50px; font-weight: bold; color: var(--bright-gold); }
        .page { display: none; flex: 1; padding: 10px; overflow-y: auto; padding-bottom: 90px; }
        .page.active { display: flex; flex-direction: column; }

        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; background: #151515; padding: 5px; border-radius: 8px; margin: 5px 0; }
        .grid-cell { background: #0a0a0a; font-size: 11px; font-weight: bold; padding: 8px 0; border: 1px solid #222; border-radius: 3px; color: #fff; }
        .booked { border: 1.2px solid #fff !important; background: #222 !important; box-shadow: inset 0 0 5px #fff; }
        .tracking { background: #fff !important; color: #000 !important; }
        .winner-hit { background: var(--red) !important; color: #fff !important; animation: pulse 0.5s infinite; }
        @keyframes pulse { 50% { transform: scale(1.1); } }

        .res-row { display: flex; justify-content: space-between; margin: 10px 0; }
        .res-card { background: #111; border: 1.5px solid var(--gold); padding: 8px; border-radius: 10px; width: 30%; }
        .res-card b { font-size: 24px; color: #fff; display: block; }

        canvas { border: 4px solid var(--gold); border-radius: 50%; background: #050505; width: 130px; height: 130px; margin: 10px auto; }
        button { width: 95%; padding: 15px; border-radius: 15px; font-size: 18px; font-weight: bold; border: none; margin: 5px auto; }
        #drawBtn { background: var(--gold); color: #000; }
        
        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 70px; } 
        .tab-btn { flex: 1; color: #777; background: none; border: none; font-weight: bold; }
        .tab-btn.active { color: #fff; background: #1a1a1a; border-top: 3px solid var(--gold); }
    </style>
</head>
<body onload="setup()">

    <div id="statusOverlay">READY</div>

    <div id="appContent">
        <div id="bookingPage" class="page">
            <h3 style="margin-top:40px;">📋 የመዝገብ ሰሌዳ</h3>
            <div id="bookingGrid" class="grid-container"></div>
            <button style="color:red; background:none; border:1px solid #444; font-size:14px;" onclick="localStorage.clear(); location.reload();">ሁሉንም አጽዳ</button>
        </div>
        
        <div id="gamePage" class="page active">
            <h3 style="margin-top:40px; color:red;">LIVE BINGO</h3>
            <div id="gameGrid" class="grid-container"></div>
            <div class="res-row">
                <div class="res-card"><span>1ኛ</span><b id="v1">?</b></div>
                <div class="res-card"><span>2ኛ</span><b id="v2">?</b></div>
                <div class="res-card"><span>3ኛ</span><b id="v3">?</b></div>
            </div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <button id="drawBtn" onclick="runSequence()">START DRAW</button>
            <button id="resetBtn" onclick="location.reload()" style="display:none; background:#222; color:#fff;">RE-START</button>
        </div>

        <div id="historyPage" class="page"><div id="historyList"></div></div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">ታሪክ</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8757888085:AAG2Gpgdyu_R_TOEtt3f_JU0F-xjmCnSPgc";
        const CHAT_ID = "-1002302321458";

        function setup() {
            const bg = document.getElementById('bookingGrid'), gg = document.getElementById('gameGrid');
            bg.innerHTML = ""; gg.innerHTML = "";
            for(let i=1; i<=100; i++) {
                let bc = document.createElement('div'); bc.className = 'grid-cell'; bc.innerText = i;
                if(localStorage.getItem('bk_'+i)) bc.classList.add('booked');
                bc.onclick = () => {
                    let v = prompt(i+" ስም:", localStorage.getItem('bk_'+i)||"");
                    if(v!==null) { localStorage.setItem('bk_'+i, v); setup(); }
                };
                bg.appendChild(bc);
                let gc = document.createElement('div'); gc.className = 'grid-cell'; gc.id = 'g'+i; gc.innerText = i;
                gg.appendChild(gc);
            }
        }

        async function runSequence() {
            document.getElementById('drawBtn').style.display = 'none';
            const ov = document.getElementById('statusOverlay'); ov.style.display = 'flex';
            for(let s of ["READY","VERIFYING","GO!"]) { ov.innerText = s; await new Promise(r=>setTimeout(r,800)); }
            ov.style.display = 'none'; startLiveDraw();
        }

        async function startLiveDraw() {
            let winners = []; while(winners.length < 3) { let r = Math.floor(Math.random()*100)+1; if(!winners.includes(r)) winners.push(r); }
            for(let i=1; i<=3; i++) {
                let win = winners[i-1];
                for(let j=0; j<15; j++) {
                    let t = Math.floor(Math.random()*100)+1; document.getElementById('g'+t).classList.add('tracking');
                    renderBall(0, false); await new Promise(r=>setTimeout(r, 70));
                    document.getElementById('g'+t).classList.remove('tracking');
                }
                renderBall(win, true); document.getElementById('v'+i).innerText = win;
                document.getElementById('g'+win).classList.add('winner-hit');
                await new Promise(r=>setTimeout(r, 1000));
            }
            sendTelegram(winners);
            document.getElementById('resetBtn').style.display = 'block';
        }

        function sendTelegram(w) {
            const names = w.map(n => localStorage.getItem('bk_'+n) || "ያልተመዘገበ");
            const msg = `🎰 የቢንጎ ዕጣ ውጤት 🎰\n1ኛ: ${w[0]} (${names[0]})\n2ኛ: ${w[1]} (${names[1]})\n3ኛ: ${w[2]} (${names[2]})`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
        }

        const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d');
        function renderBall(val, final) {
            cx.clearRect(0,0,200,200);
            cx.beginPath(); cx.arc(100,100,80,0,Math.PI*2); cx.fillStyle="#bf953f"; cx.fill();
            cx.fillStyle="#000"; cx.font="bold 70px Arial"; cx.textAlign="center"; cx.fillText(final?val:"?",100,125);
        }

        function showPage(p, b) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById(p).classList.add('active'); b.classList.add('active');
        }
    </script>
</body>
</html>
