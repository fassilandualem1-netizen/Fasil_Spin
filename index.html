<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP - Host Edition Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --red: #ff3333; }
        body { font-family: sans-serif; background: #000; color: var(--gold); text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #lockScreen { position: fixed; inset: 0; background: #000; z-index: 200000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .lock-box { background: #111; padding: 30px; border: 2px solid var(--gold); border-radius: 20px; width: 85%; }
        .lock-input { width: 100%; padding: 15px; margin: 15px 0; background: #000; border: 1px solid var(--gold); color: #fff; text-align: center; font-size: 24px; border-radius: 10px; }
        .device-id-tag { background: #222; padding: 10px; border-radius: 5px; color: #fff; font-family: monospace; font-size: 18px; margin: 10px 0; border: 1px dashed var(--gold); }

        #statusOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100002; display: none; justify-content: center; align-items: center; font-size: 55px; font-weight: bold; color: var(--bright-gold); }

        #appContent { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .page { display: none; flex: 1; padding: 10px; overflow-y: auto; box-sizing: border-box; padding-bottom: 90px; }
        .page.active { display: flex; flex-direction: column; }

        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 75px; z-index: 1000; } 
        .tab-btn { flex: 1; color: #777; border: none; background: none; font-weight: bold; font-size: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #1a1a1a; }

        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2.5px; background: #151515; padding: 5px; border-radius: 8px; width: 100%; margin: 5px 0; }
        .grid-cell { background: #0a0a0a; font-size: 10px; font-weight: bold; padding: 6px 0; border: 1px solid #222; border-radius: 3px; }
        .booked { border: 1px solid #fff !important; background: #222 !important; }
        .winner-hit { background: var(--red) !important; color: #fff !important; animation: winner-pulse 0.8s infinite; }
        @keyframes winner-pulse { 50% { transform: scale(1.3); } }

        .res-row { display: flex; justify-content: space-between; margin: 8px 0; gap: 6px; }
        .res-card { background: #0a0a0a; border: 1.5px solid var(--gold); padding: 5px; border-radius: 10px; width: 32%; }
        .res-card b { font-size: 26px; color: #fff; display: block; }

        canvas { border: 4px solid var(--gold); border-radius: 50%; background: #050505; width: 120px; height: 120px; margin: 5px auto; }
        button#drawBtn { width: 95%; padding: 15px; border-radius: 15px; font-size: 19px; font-weight: bold; background: var(--gold); color: #000; border: none; margin: 5px auto; cursor: pointer; }
        .setup-input { width: 90%; padding: 12px; margin: 10px auto; border-radius: 8px; border: 1px solid var(--gold); background: #111; color: #fff; text-align: center; }
        .save-btn { background: var(--gold); color: #000; padding: 15px; width: 90%; border-radius: 10px; font-weight: bold; border: none; margin: 10px auto; }
    </style>
</head>
<body onload="checkLicense()">

    <div id="lockScreen">
        <div class="lock-box">
            <h2>FASIL VIP</h2>
            <div class="device-id-tag" id="myDeviceId">---</div>
            <input type="text" id="licenseKey" class="lock-input" placeholder="ACTIVATE CODE">
            <button onclick="validateKey()" style="background:var(--gold); border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold;">ACTIVATE</button>
        </div>
    </div>

    <div id="statusOverlay">READY</div>

    <div id="appContent">
        <div id="bookingPage" class="page">
            <h3 style="margin-top:40px;">📋 መዝገብ</h3>
            <div id="bookingGrid" class="grid-container"></div>
            <button style="color:red; background:none; border:1px solid #444; padding:10px; border-radius:10px; margin-top:15px;" onclick="clearBookingOnly()">አፅዳ</button>
        </div>
        
        <div id="gamePage" class="page active">
            <h3 style="margin-top:40px; color:red;">HOST MODE</h3>
            <div id="gameGrid" class="grid-container"></div>
            <div class="res-row">
                <div class="res-card"><span>1ኛ</span><b id="v1">?</b></div>
                <div class="res-card"><span>2ኛ</span><b id="v2">?</b></div>
                <div class="res-card"><span>3ኛ</span><b id="v3">?</b></div>
            </div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <button id="drawBtn" onclick="runSequence()">START DRAW</button>
            <button id="resetBtn" onclick="location.reload()" style="display:none; background:#111; color:#fff; padding:15px; border-radius:15px; width:95%; margin:5px auto; font-weight:bold;">RE-START</button>
        </div>

        <div id="historyPage" class="page">
            <h3 style="margin-top:40px;">🕒 ታሪክ</h3>
            <div id="historyList"></div>
        </div>

        <div id="setupPage" class="page">
            <h3 style="margin-top:40px;">⚙️ SETUP</h3>
            <input type="text" id="botTokenInput" class="setup-input" placeholder="Bot Token">
            <input type="text" id="chatIdInput" class="setup-input" placeholder="Chat ID">
            <button class="save-btn" onclick="saveSettings()">SAVE SETTINGS</button>
        </div>

        <div id="navTabs" class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">📋 መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">🕒 ታሪክ</button>
            <button class="tab-btn" onclick="showPage('setupPage', this)">⚙️ SETUP</button>
        </div>
    </div>

    <script>
        const MASTER_KEY = "9988";
        const rowColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"];
        let audioCtx;

        // --- ድምፅን ለመቀስቀስ (Auto-Unlock) ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            // አንድ ባዶ ድምፅ በማጫወት ሲስተሙን መክፈት
            const oscillator = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            gain.gain.value = 0; oscillator.connect(gain); gain.connect(audioCtx.destination);
            oscillator.start(0); oscillator.stop(0.01);
        }

        function playSound(freq, type, duration, vol=0.8) {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function speak(text) {
            return new Promise((resolve) => {
                window.speechSynthesis.cancel(); // ያለፈውን ድምፅ ማጽዳት
                const msg = new SpeechSynthesisUtterance();
                msg.text = text;
                msg.lang = 'en-US';
                msg.rate = 0.85;
                msg.volume = 1.0;
                msg.onend = () => resolve();
                msg.onerror = () => resolve();
                window.speechSynthesis.speak(msg);
                // ለደህንነት ከ 4 ሰከንድ በላይ ድምፁ ባይሰማ እንዲቀጥል
                setTimeout(resolve, 4000);
            });
        }

        function checkLicense() {
            let uid = localStorage.getItem('f_uid') || "FS-" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('f_uid', uid);
            document.getElementById('myDeviceId').innerText = uid;
            const savedKey = localStorage.getItem('f_license');
            const expectedKey = (parseInt(uid.split('-')[1]) + 1000).toString();
            if(savedKey === MASTER_KEY || savedKey === expectedKey) openApp();
            else document.getElementById('lockScreen').style.display = 'flex';
        }

        function validateKey() {
            const input = document.getElementById('licenseKey').value.trim();
            const expectedKey = (parseInt(localStorage.getItem('f_uid').split('-')[1]) + 1000).toString();
            if(input === MASTER_KEY || input === expectedKey) {
                localStorage.setItem('f_license', input);
                location.reload();
            } else alert("ስህተት!");
        }

        function openApp() {
            document.getElementById('appContent').style.display = 'flex';
            document.getElementById('chatIdInput').value = localStorage.getItem('f_chat_id') || "";
            document.getElementById('botTokenInput').value = localStorage.getItem('f_bot_token') || "";
            setup();
        }

        function setup() {
            const bg = document.getElementById('bookingGrid'), gg = document.getElementById('gameGrid');
            bg.innerHTML = ""; gg.innerHTML = "";
            for(let i=1; i<=100; i++) {
                let color = rowColors[Math.floor((i-1)/10)];
                let bc = document.createElement('div'); bc.className = 'grid-cell'; bc.innerText = i;
                if(localStorage.getItem('bk_'+i)) bc.classList.add('booked');
                bc.onclick = () => {
                    let v = prompt(i+" ስም:", localStorage.getItem('bk_'+i)||"");
                    if(v!==null) { if(v.trim()==="") localStorage.removeItem('bk_'+i); else localStorage.setItem('bk_'+i, v); setup(); }
                }; bg.appendChild(bc);
                let gc = document.createElement('div'); gc.className = 'grid-cell'; gc.id = 'g'+i; gc.innerText = i; 
                gc.style.color = color; gc.style.borderColor = color; gg.appendChild(gc);
            }
        }

        function showPage(p, b) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById(p).classList.add('active'); b.classList.add('active');
            if(p==='historyPage') loadHistory();
        }

        const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d');
        function renderBall(val, final) {
            cx.clearRect(0,0,200,200);
            let ballColor = (final && val > 0) ? rowColors[Math.floor((val-1)/10)] : '#bf953f';
            let g = cx.createRadialGradient(70,70,10,100,100,80);
            g.addColorStop(0,'#fcf6ba'); g.addColorStop(1, ballColor);
            cx.beginPath(); cx.arc(100,100,85,0,Math.PI*2); cx.fillStyle=g; cx.fill();
            cx.fillStyle="#000"; cx.font="bold 75px Arial"; cx.textAlign="center"; cx.fillText(val||"?", 100, 125);
        }

        async function runSequence() {
            initAudio(); // እዚህ ጋር ድምፁ ይከፈታል
            if(!localStorage.getItem('f_chat_id')) { alert("Setup Chat ID!"); return; }
            document.getElementById('drawBtn').style.display = 'none';
            const ov = document.getElementById('statusOverlay'); ov.style.display = 'flex';
            playSound(800, 'sine', 0.2); ov.innerText = "READY";
            await new Promise(r=>setTimeout(r,800)); 
            playSound(1200, 'square', 0.4); ov.innerText = "GO!";
            await new Promise(r=>setTimeout(r,800)); 
            ov.style.display = 'none'; startLiveDraw();
        }

        async function startLiveDraw() {
            // የዘበራረቀ ዕጣ ሎጂክ
            let all = Array.from({length: 100}, (_, i) => i + 1);
            for(let i = all.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [all[i], all[j]] = [all[j], all[i]];
            }
            let winners = [all[0], all[1], all[2]];

            for(let i=1; i<=3; i++) {
                let win = winners[i-1];
                for(let j=0; j<15; j++) { 
                    playSound(Math.random()*300+400, 'triangle', 0.05, 0.4);
                    renderBall(Math.floor(Math.random()*100)+1, false); 
                    await new Promise(r=>setTimeout(r, 70)); 
                }
                playSound(523, 'square', 0.6, 1.0); renderBall(win, true); 
                document.getElementById('v'+i).innerText = win;
                document.getElementById('g'+win).classList.add('winner-hit');
                
                // ቁጥሩን መጥራት
                let winTxt = (i===1) ? "First winner number " : (i===2) ? "Second winner number " : "Third winner number ";
                await speak(winTxt + win);
                await new Promise(r=>setTimeout(r, 1000));
            }
            saveHist(winners); sendToTelegram(winners);
            document.getElementById('resetBtn').style.display = 'block';
        }

        function sendToTelegram(w) {
            const cid = localStorage.getItem('f_chat_id');
            const token = localStorage.getItem('f_bot_token') || "8757888085:AAG2Gpgdyu_R_TOEtt3f_JU0F-xjmCnSPgc";
            const names = w.map(num => localStorage.getItem('bk_'+num) || "None");
            const msg = `🎰 **FASIL VIP BINGO** 🎰\n🥇 1st: ${w[0]} (${names[0]})\n🥈 2nd: ${w[1]} (${names[1]})\n🥉 3rd: ${w[2]} (${names[2]})`;
            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: cid, text: msg, parse_mode: 'Markdown' })
            });
        }

        function saveHist(w) {
            let h = JSON.parse(localStorage.getItem('f_h')||"[]");
            h.unshift({t: new Date().toLocaleTimeString(), r: w});
            localStorage.setItem('f_h', JSON.stringify(h.slice(0,20)));
        }

        function loadHistory() {
            let h = JSON.parse(localStorage.getItem('f_h')||"[]");
            document.getElementById('historyList').innerHTML = h.map(x => `<div style="background:#111; padding:10px; margin:5px; border-radius:10px; border:1px solid #333;"><small>${x.t}</small><br><b>${x.r.join(' - ')}</b></div>`).join('');
        }

        function saveSettings() {
            localStorage.setItem('f_chat_id', document.getElementById('chatIdInput').value.trim());
            localStorage.setItem('f_bot_token', document.getElementById('botTokenInput').value.trim());
            alert("Saved!");
        }

        function clearBookingOnly() {
            if(confirm("ሁሉንም ስም ላጥፋ?")) { for(let i=1; i<=100; i++) localStorage.removeItem('bk_'+i); setup(); }
        }
    </script>
</body>
</html>
