<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP PRO</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --red: #ff3333; }
        body { font-family: sans-serif; background: #000; color: var(--gold); text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #appContent { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .page { display: none; flex: 1; padding: 10px; overflow-y: auto; box-sizing: border-box; padding-bottom: 90px; }
        .page.active { display: flex; flex-direction: column; }

        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 75px; z-index: 1000; } 
        .tab-btn { flex: 1; color: #777; border: none; background: none; font-weight: bold; font-size: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #1a1a1a; }

        /* ሰንጠረዥ */
        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2.5px; background: #151515; padding: 5px; border-radius: 8px; width: 100%; margin: 5px 0; }
        .grid-cell { background: #0a0a0a; font-size: 10px; font-weight: bold; padding: 8px 0; border: 1px solid #222; border-radius: 3px; }
        
        /* መዝገብ ላይ ነጭ ብቻ */
        #bookingGrid .grid-cell { color: #fff !important; border-color: #333; }
        .booked { border: 1px solid var(--gold) !important; box-shadow: inset 0 0 5px var(--gold); }

        /* ዕጣ ገፅ አኒሜሽን */
        .tracking { background: #fff !important; color: #000 !important; transform: scale(1.1); z-index: 5; }
        .winner-hit { background: var(--red) !important; color: #fff !important; animation: winner-pulse 0.6s infinite alternate; }
        @keyframes winner-pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        .res-row { display: flex; justify-content: space-between; margin: 8px 0; gap: 6px; }
        .res-card { background: #0a0a0a; border: 1.5px solid var(--gold); padding: 5px; border-radius: 10px; width: 32%; }
        .res-card b { font-size: 24px; color: #fff; display: block; }

        canvas { border: 4px solid var(--gold); border-radius: 50%; background: #050505; width: 120px; height: 120px; margin: 5px auto; }
        button#drawBtn { width: 95%; padding: 15px; border-radius: 15px; font-size: 18px; font-weight: bold; background: var(--gold); color: #000; border: none; margin: 10px auto; }

        /* የታሪክ ኳሶች */
        .history-item { background:#111; border:1px solid #333; margin:8px; padding:10px; border-radius:10px; text-align:left; border-left: 4px solid var(--gold); }
        .h-ball-row { display: flex; gap: 12px; margin-top: 8px; }
        .ball-box { text-align: center; }
        .h-ball { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 13px; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.4); }
        .ball-label { font-size: 9px; color: #888; margin-top: 3px; display: block; }
    </style>
</head>
<body onload="initApp()">

    <div id="statusOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; display:none; justify-content:center; align-items:center; font-size:40px; color:white; font-weight:bold;">READY</div>

    <div id="appContent">
        <div id="bookingPage" class="page">
            <h3 style="margin-top:40px;">የተመዘገቡ</h3>
            <div id="bookingGrid" class="grid-container"></div>
            <button onclick="clearAllData()" style="color:red; background:none; border:1px solid #444; padding:8px; border-radius:10px; margin-top:10px;">ሁሉንም አጽዳ</button>
        </div>
        
        <div id="gamePage" class="page active">
            <h3 style="margin-top:40px;">LIVE DRAW</h3>
            <div id="gameGrid" class="grid-container"></div>
            <div class="res-row">
                <div class="res-card"><span>1ኛ</span><b id="v1">?</b></div>
                <div class="res-card"><span>2ኛ</span><b id="v2">?</b></div>
                <div class="res-card"><span>3ኛ</span><b id="v3">?</b></div>
            </div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <button id="drawBtn" onclick="startDrawSequence()">START DRAW</button>
        </div>

        <div id="historyPage" class="page"><div id="historyList"></div></div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">📋 መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">🕒 ታሪክ</button>
        </div>
    </div>

    <script>
        const rowColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"];
        
        function initApp() {
            setupGrids();
            renderBall(0, true);
        }

        function setupGrids() {
            const bg = document.getElementById('bookingGrid');
            const gg = document.getElementById('gameGrid');
            bg.innerHTML = ""; gg.innerHTML = "";

            for(let i=1; i<=100; i++) {
                let color = rowColors[Math.floor((i-1)/10)];
                
                // መዝገብ ገፅ
                let bc = document.createElement('div');
                bc.className = 'grid-cell';
                bc.innerText = i;
                if(localStorage.getItem('user_'+i)) bc.classList.add('booked');
                bc.onclick = () => {
                    let name = prompt(i + " ስም ያስገቡ:", localStorage.getItem('user_'+i) || "");
                    if(name !== null) {
                        if(name.trim() === "") localStorage.removeItem('user_'+i);
                        else localStorage.setItem('user_'+i, name);
                        setupGrids();
                    }
                };
                bg.appendChild(bc);

                // ዕጣ ገፅ
                let gc = document.createElement('div');
                gc.className = 'grid-cell';
                gc.id = 'g' + i;
                gc.innerText = i;
                gc.style.color = color;
                gc.style.borderColor = color;
                gg.appendChild(gc);
            }
        }

        async function startDrawSequence() {
            document.getElementById('drawBtn').disabled = true;
            let winners = [];
            while(winners.length < 3) {
                let r = Math.floor(Math.random() * 100) + 1;
                if(!winners.includes(r)) winners.push(r);
            }

            for(let i=0; i<3; i++) {
                // Tracking Animation
                for(let j=0; j<15; j++) {
                    let temp = Math.floor(Math.random() * 100) + 1;
                    document.getElementById('g'+temp).classList.add('tracking');
                    await new Promise(r => setTimeout(r, 60));
                    document.getElementById('g'+temp).classList.remove('tracking');
                }
                let win = winners[i];
                document.getElementById('v'+(i+1)).innerText = win;
                document.getElementById('g'+win).classList.add('winner-hit');
                renderBall(win, true);
                await new Promise(r => setTimeout(r, 1000));
            }
            saveToHistory(winners);
            setTimeout(() => location.reload(), 3000);
        }

        function renderBall(v, final) {
            const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d');
            cx.clearRect(0,0,200,200);
            let color = v > 0 ? rowColors[Math.floor((v-1)/10)] : "#333";
            let g = cx.createRadialGradient(70,70,10,100,100,80);
            g.addColorStop(0,'#fff'); g.addColorStop(1, color);
            cx.beginPath(); cx.arc(100,100,85,0,Math.PI*2); cx.fillStyle=g; cx.fill();
            cx.fillStyle="#000"; cx.font="bold 70px Arial"; cx.textAlign="center"; cx.fillText(v || "?", 100, 125);
        }

        function saveToHistory(res) {
            let h = JSON.parse(localStorage.getItem('fasil_h') || "[]");
            h.unshift({ t: new Date().toLocaleTimeString(), r: res });
            localStorage.setItem('fasil_h', JSON.stringify(h.slice(0,20)));
        }

        function loadHistory() {
            const list = document.getElementById('historyList');
            const h = JSON.parse(localStorage.getItem('fasil_h') || "[]");
            list.innerHTML = h.map(item => `
                <div class="history-item">
                    <small>🕒 ሰዓት: ${item.t}</small>
                    <div class="h-ball-row">
                        ${item.r.map((n, i) => `
                            <div class="ball-box">
                                <div class="h-ball" style="background:radial-gradient(circle at 30% 30%, #fff, ${rowColors[Math.floor((n-1)/10)]})">${n}</div>
                                <span class="ball-label">${i+1}ኛ</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function showPage(p, b) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            b.classList.add('active');
            if(p === 'historyPage') loadHistory();
        }

        function clearAllData() {
            if(confirm("ሁሉንም ዳታ ላጥፋ?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
