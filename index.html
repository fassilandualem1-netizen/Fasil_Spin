<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP PRO - Secured Enterprise</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --red: #ff3333; --dark: #000; }
        html, body { overflow: hidden; height: 100vh; width: 100vw; margin: 0; padding: 0; position: fixed; touch-action: none; background: var(--dark); font-family: 'Segoe UI', sans-serif; -webkit-user-select: none; user-select: none; }
        body { color: var(--gold); text-align: center; display: flex; flex-direction: column; }
        
        @media screen and (max-height: 720px) { #appContent { transform: scale(0.93); transform-origin: top; } }

        .top-container { margin-top: 15px; }
        .live-status-bar { display: flex; align-items: center; justify-content: center; background: #111; padding: 4px 12px; border-radius: 50px; border: 1px solid #333; width: fit-content; margin: 0 auto 10px auto; }
        .blink-dot { width: 8px; height: 8px; background-color: var(--red); border-radius: 50%; margin-right: 8px; animation: live-blink 1s infinite; }
        @keyframes live-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #focusWinnerDisplay { height: 130px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .focus-label { font-size: 26px; font-weight: bold; color: var(--bright-gold); text-shadow: 0 0 10px var(--gold); min-height: 35px; }
        .focus-num { font-size: 90px; font-weight: 900; color: #fff; text-shadow: 0 0 25px var(--gold); line-height: 1; }

        #appContent { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .page { display: none; flex: 1; padding: 15px; box-sizing: border-box; overflow: hidden; position: relative; }
        .page.active { display: flex; flex-direction: column; }
        
        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2.5px; background: #151515; padding: 4px; border-radius: 8px; margin: 5px 0; }
        .grid-cell { background: #0a0a0a; font-size: 10px; font-weight: bold; padding: 8px 0; border: 1px solid #222; border-radius: 3px; }
        .booked { border: 1px solid #fff !important; background: #333 !important; }
        .winner-hit { background: var(--red) !important; color: #fff !important; animation: winner-pulse 0.8s infinite; }
        @keyframes winner-pulse { 50% { transform: scale(1.2); } }
        
        canvas { border: 4px solid var(--gold); border-radius: 50%; background: #050505; width: 110px; height: 110px; margin: 2px auto; }
        button.main-btn { width: 100%; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; background: var(--gold); color: #000; border: none; box-shadow: 0 4px 15px rgba(191,149,63,0.4); cursor: pointer; transition: 0.2s; }
        button.main-btn:disabled { background: #444; color: #777; box-shadow: none; cursor: not-allowed; }

        .about-scroll { overflow-y: auto; height: 70vh; padding-bottom: 20px; text-align: left; }
        .about-card { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 3px solid var(--gold); }
        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 75px; z-index: 1000; } 
        .tab-btn { flex: 1; color: #777; border: none; background: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #1a1a1a; }
        
        #lockScreen { display:none; position:fixed; inset:0; background:#000; z-index:10000; flex-direction:column; justify-content:center; align-items:center; }
        #finalOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body onload="checkLicense()">

    <div id="lockScreen">
        <div style="background:#111; padding:30px; border:2px solid var(--gold); border-radius:20px; width:80%;">
            <h2 style="color:var(--gold);">FASIL VIP LICENSE</h2>
            <p id="lockMsg" style="color:#bbb; font-size:13px;">የ 5 ቀን ነፃ የሙከራ ጊዜዎ አብቅቷል!</p>
            <div id="myDeviceId" style="color:#fff; margin:15px 0; font-family:monospace; background:#000; padding:10px; border-radius:5px;">---</div>
            <input type="text" id="licenseKey" style="width:90%; padding:14px; text-align:center; border-radius:8px; background:#000; color:#fff; border:1px solid var(--gold);" placeholder="Activation Key">
            <br><br>
            <button onclick="validateKey()" class="main-btn">ACTIVATE SYSTEM</button>
        </div>
    </div>

    <div id="appContent">
        <div id="gamePage" class="page active">
            <div class="top-container">
                <div class="live-status-bar"><div class="blink-dot"></div><span id="liveClock" style="color:#fff; font-family:monospace;">00:00:00</span></div>
                <div id="focusWinnerDisplay">
                    <div class="focus-label" id="levelLabel">READY?</div>
                    <div class="focus-num" id="currentResult">--</div>
                </div>
            </div>
            <div id="gameGrid" class="grid-container"></div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <div style="padding:5px 20px;"><button id="drawBtn" class="main-btn" onclick="runSequence()">START DRAWING</button></div>
        </div>

        <div id="aboutPage" class="page">
            <div class="about-scroll">
                <h3 style="color:var(--bright-gold); border-bottom:1px solid var(--gold); padding-bottom:10px;">FASIL VIP TECH</h3>
                <div class="about-card"><div style="color:var(--gold); font-weight:bold;">🚀 ስለ ሲስተሙ</div><div style="font-size:13px; color:#bbb;">ይህ ሲስተም ለ 5 ቀናት በነፃ እንዲሰራ ተደርጎ የተዘጋጀ ነው።</div></div>
                <div class="about-card"><div style="color:var(--gold); font-weight:bold;">📧 Support</div><div style="font-size:13px; color:#bbb;">Fassilandualem1@gmail.com</div></div>
            </div>
        </div>

        <div id="bookingPage" class="page"><h3>📋 መዝገብ</h3><div id="bookingGrid" class="grid-container"></div><button onclick="clearBookingOnly()" style="color:red; background:none; border:1px solid #444; padding:10px; border-radius:10px; margin-top:10px; width: 100%;">መዝገብ አፅዳ</button></div>
        <div id="historyPage" class="page"><h3>🕒 ታሪክ</h3><div id="historyList"></div></div>
        <div id="setupPage" class="page"><h3>⚙️ SETUP</h3><input type="text" id="botTokenInput" placeholder="Bot Token" style="width:90%; padding:14px; margin-bottom:10px; background:#111; color:#fff; border:1px solid var(--gold);"><input type="text" id="chatIdInput" placeholder="Chat ID" style="width:90%; padding:14px; background:#111; color:#fff; border:1px solid var(--gold);"><button class="main-btn" onclick="saveSettings()" style="margin-top:10px;">SAVE SETTINGS</button></div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">📋 መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">🕒 ታሪክ</button>
            <button class="tab-btn" onclick="showPage('setupPage', this)">⚙️ SETUP</button>
            <button class="tab-btn" onclick="showPage('aboutPage', this)">ℹ️ ABOUT</button>
        </div>
    </div>

    <script>
        const DEFAULT_BOT_TOKEN = "8757888085:AAG2Gpgdyu_R_TOEtt3f_JU0F-xjmCnSPgc";
        let audioCtx = null;
        const rowColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"];

        function checkLicense() {
            let uid = localStorage.getItem('f_uid') || "FS-" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('f_uid', uid);
            document.getElementById('myDeviceId').innerText = uid;

            const isPremium = localStorage.getItem('f_is_premium');
            const startDate = localStorage.getItem('f_start_date');

            // 1. ለዘላለም የተከፈተ ከሆነ
            if (isPremium === "true") {
                document.getElementById('appContent').style.display = 'flex';
                openApp();
                return;
            }

            // 2. የመጀመሪያ ቀን መመዝገቢያ
            if (!startDate) {
                localStorage.setItem('f_start_date', Date.now());
            }

            // 3. የ 5 ቀን ስሌት (5 ቀናት በሚሊሰከንድ)
            const trialLimit = 5 * 24 * 60 * 60 * 1000;
            const timeElapsed = Date.now() - parseInt(localStorage.getItem('f_start_date'));

            if (timeElapsed < trialLimit) {
                document.getElementById('appContent').style.display = 'flex';
                openApp();
            } else {
                document.getElementById('lockScreen').style.display = 'flex';
            }
        }

        function validateKey() {
            let k = document.getElementById('licenseKey').value.trim();
            let uid = localStorage.getItem('f_uid');
            let expected = (parseInt(uid.split('-')[1]) + 1000).toString();

            if (k === "9988" || k === expected) {
                localStorage.setItem('f_is_premium', "true");
                location.reload();
            } else {
                alert("የተሳሳተ ቁልፍ ነው!");
            }
        }

        function playSound(f, t, d, v=2.5) { 
            try { 
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state==='suspended') audioCtx.resume(); 
                let o=audioCtx.createOscillator(), g=audioCtx.createGain(); 
                o.type=t; o.frequency.setValueAtTime(f, audioCtx.currentTime); 
                g.gain.setValueAtTime(v, audioCtx.currentTime); 
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+d); 
                o.connect(g); g.connect(audioCtx.destination); 
                o.start(); o.stop(audioCtx.currentTime+d); 
                if(navigator.vibrate) navigator.vibrate(40);
            } catch(e){} 
        }

        async function startLiveDraw() {
            let all = Array.from({length: 100}, (_, i) => i + 1);
            for(let i=all.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [all[i], all[j]]=[all[j], all[i]]; }
            let winners = [all[0], all[1], all[2]];

            for(let i=1; i<=3; i++) {
                let win = winners[i-1];
                document.getElementById('levelLabel').innerText = "READY?"; playSound(523, 'sawtooth', 0.6, 2.5); await new Promise(r=>setTimeout(r, 2000));
                document.getElementById('levelLabel').innerText = "VERIFYING..."; playSound(220, 'square', 1.0, 2.0); await new Promise(r=>setTimeout(r, 2000));
                document.getElementById('levelLabel').innerText = "GO!"; playSound(880, 'sawtooth', 0.5, 3.0); await new Promise(r=>setTimeout(r, 1000));

                let startTime = Date.now();
                while(Date.now() - startTime < 5000) {
                    playSound(Math.random()*600+200, 'triangle', 0.08, 1.8);
                    let rand = Math.floor(Math.random()*100)+1;
                    renderBall(rand, false); document.getElementById('currentResult').innerText = rand;
                    await new Promise(r=>setTimeout(r, 70));
                }
                renderBall(win, true); document.getElementById('currentResult').innerText = win; document.getElementById('levelLabel').innerText = i + "ኛ ዕጣ";
                document.getElementById('g'+win).classList.add('winner-hit');
                await new Promise(r=>setTimeout(r, 3000));
            }
        }
        
        // (Rest of your functions like setup, renderBall, showPage, saveSettings, etc. remain unchanged)
        function openApp() { setup(); renderBall("?", false); setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000); }
        function setup() { const bg=document.getElementById('bookingGrid'), gg=document.getElementById('gameGrid'); bg.innerHTML=""; gg.innerHTML=""; for(let i=1; i<=100; i++){ let clr = rowColors[Math.floor((i-1)/10)], bc=document.createElement('div'); bc.className='grid-cell'; bc.innerText=i; if(localStorage.getItem('bk_'+i)) bc.classList.add('booked'); bc.onclick=()=>{ let v=prompt(i+" ስም:", localStorage.getItem('bk_'+i)||""); if(v!==null){ v.trim()===""?localStorage.removeItem('bk_'+i):localStorage.setItem('bk_'+i,v); setup(); } }; bg.appendChild(bc); let gc=document.createElement('div'); gc.className='grid-cell'; gc.id='g'+i; gc.innerText=i; gc.style.color=clr; gc.style.borderColor=clr; gg.appendChild(gc); } }
        function renderBall(v, f) { const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d'); cx.clearRect(0,0,200,200); let clr = (f && v>0)?rowColors[Math.floor((v-1)/10)]:'#bf953f'; let g=cx.createRadialGradient(70,70,10,100,100,80); g.addColorStop(0,'#fcf6ba'); g.addColorStop(1, clr); cx.beginPath(); cx.arc(100,100,85,0,Math.PI*2); cx.fillStyle=g; cx.fill(); cx.fillStyle="#000"; cx.font="bold 75px Arial"; cx.textAlign="center"; cx.fillText(v||"?",100,125); }
        function showPage(p, b) { document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active')); document.getElementById(p).classList.add('active'); b.classList.add('active'); }
        async function runSequence() { if(!localStorage.getItem('f_chat_id')) return alert("Setup Chat ID First!"); document.getElementById('drawBtn').disabled = true; startLiveDraw(); }
    </script>
</body>
</html>
