<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL BINGO PRO - Sound Edition</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --red: #ff3333; }
        body { font-family: sans-serif; background: #000; color: var(--gold); text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }
        
        #lockScreen { position: fixed; inset: 0; background: #000; z-index: 200000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #appContent { height: 100vh; display: none; flex-direction: column; position: relative; }
        .page { display: none; flex: 1; padding: 10px; box-sizing: border-box; overflow: hidden; }
        .page.active { display: flex; flex-direction: column; justify-content: flex-start; }

        .live-status-bar { display: flex; align-items: center; justify-content: center; background: #111; padding: 6px 15px; border-radius: 50px; border: 1px solid #333; width: fit-content; margin: 35px auto 5px auto; }
        .blink-dot { width: 8px; height: 8px; background-color: var(--red); border-radius: 50%; margin-right: 8px; animation: live-blink 1s infinite; }
        @keyframes live-blink { 50% { opacity: 0.3; } }

        .static-results { display: flex; justify-content: space-around; margin: 10px 0; min-height: 50px; }
        .res-box { text-align: center; width: 30%; }
        .res-box span { font-size: 11px; color: var(--gold); display: block; font-weight: bold;}
        .res-box b { font-size: 26px; color: #fff; display: block; }

        #focusWinnerDisplay { margin: 20px 0; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        .focus-label { font-size: 45px; font-weight: 900; color: var(--bright-gold); letter-spacing: 2px; text-shadow: 0 0 15px var(--gold); }
        .focus-current-num { font-size: 25px; color: #fff; margin-top: 5px; opacity: 0.8; }

        .grid-container { 
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; 
            background: #151515; padding: 8px; border-radius: 12px; border: 1px solid #333; 
            width: 98%; margin: 5px auto; max-height: 350px; overflow: hidden; 
        }
        .grid-cell { 
            background: #0a0a0a; font-size: 14px; font-weight: bold; padding: 10px 0; 
            border: 1px solid #222; border-radius: 6px; display: flex; align-items: center; justify-content: center; 
        }
        .booked { border: 1px solid #fff !important; background: #333 !important; }
        .winner-hit { background: var(--red) !important; color: #fff !important; animation: winner-pulse 0.8s infinite; border: 1px solid #fff !important;}
        @keyframes winner-pulse { 50% { transform: scale(1.15); } }
        
        .draw-section { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1; padding-bottom: 85px; }
        button.main-btn { width: 95%; padding: 18px; border-radius: 15px; font-size: 22px; font-weight: bold; background: var(--gold); color: #000; border: none; box-shadow: 0 5px 15px rgba(191,149,63,0.4); }
        
        .about-card { background: #111; border: 1px solid var(--gold); border-radius: 20px; padding: 20px; width: 92%; margin: 10px auto; text-align: left; overflow-y: auto; max-height: 70vh; }
        .contact-btn { display: block; background: #222; color: var(--gold); padding: 14px; margin-top: 15px; text-decoration: none; text-align: center; border-radius: 12px; border: 1px solid var(--gold); font-weight: bold; }

        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 70px; z-index: 1000; } 
        .tab-btn { flex: 1; color: #777; border: none; background: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; border-top: 3px solid var(--gold); background: #1a1a1a; }
        .setup-input { width: 90%; padding: 12px; margin: 10px auto; border-radius: 8px; border: 1px solid var(--gold); background: #111; color: #fff; text-align: center; }
    </style>
</head>
<body onload="checkLicense()">

    <div id="lockScreen">
        <div style="background:#111; padding:30px; border:2px solid var(--gold); border-radius:20px; width:80%;">
            <h2>FASIL VIP PRO</h2>
            <div id="myDeviceId" style="color:#fff; margin:10px; font-size:18px;">---</div>
            <input type="password" id="licenseKey" style="width:90%; padding:12px; text-align:center; border-radius:8px; border:1px solid var(--gold); background:#000; color:#fff;" placeholder="Activation Key">
            <button onclick="validateKey()" class="main-btn">ACTIVATE</button>
        </div>
    </div>

    <div id="appContent">
        <div id="bookingPage" class="page">
            <h3>📋 መዝገብ</h3>
            <div id="bookingGrid" class="grid-container" style="max-height: 70vh;"></div>
            <button onclick="clearBookingOnly()" style="color:red; background:none; border:1px solid red; padding:8px; border-radius:8px; margin-top:10px; width:90%;">RESET ALL NAMES</button>
        </div>
        
        <div id="gamePage" class="page active">
            <div class="live-status-bar">
                <div class="blink-dot"></div>
                <span id="liveClock" style="color: #fff; font-family: monospace; font-size: 12px;">00:00:00</span>
            </div>
            <div class="static-results">
                <div class="res-box"><span>1ኛ ዕጣ</span><b id="s1">-</b></div>
                <div class="res-box"><span>2ኛ ዕጣ</span><b id="s2">-</b></div>
                <div class="res-box"><span>3ኛ ዕጣ</span><b id="s3">-</b></div>
            </div>
            
            <div id="focusWinnerDisplay">
                <div class="focus-label" id="levelLabel">READY?</div>
                <div class="focus-current-num" id="rollingNum">Waiting...</div>
            </div>

            <div id="gameGrid" class="grid-container"></div>
            
            <div class="draw-section">
                <button id="drawBtn" class="main-btn" onclick="runSequence()">START DRAW</button>
                <button id="resetBtn" class="main-btn" onclick="location.reload()" style="display:none;">አዲስ ዕጣ</button>
            </div>
        </div>

        <div id="historyPage" class="page"><h3>🕒 ታሪክ</h3><div id="historyList" style="overflow-y:auto; flex:1;"></div></div>
        
        <div id="setupPage" class="page">
            <h3>⚙️ Settings</h3>
            <input type="text" id="botTokenInput" class="setup-input" placeholder="Bot Token">
            <input type="text" id="chatIdInput" class="setup-input" placeholder="Chat ID">
            <button onclick="saveSettings()" class="main-btn">SAVE SETTINGS</button>
        </div>
        
        <div id="aboutPage" class="page">
            <div class="about-card">
                <h2 style="color:var(--bright-gold); text-align:center;">FASIL BINGO PRO</h2>
                <p>ይህ ሶፍትዌር ለቢንጎ እና ለተለያዩ የዕጣ ጨዋታዎች ተዓማኒነት ያለውና ፈጣን የሆነ የዲጂታል ዕጣ ማውጫ ሲስተም ነው።</p>
                <hr style="border:0.5px solid #333;">
                <p>📞 <b>Phone:</b> +251951381356</p>
                <a href="tg://resolve?domain=Fassilandualem" class="contact-btn">📱 በቴሌግራም አግኙኝ</a>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">📋 መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">🕒 ታሪክ</button>
            <button class="tab-btn" onclick="showPage('setupPage', this)">⚙️ SETUP</button>
            <button class="tab-btn" onclick="showPage('aboutPage', this)">ℹ️ ABOUT</button>
        </div>
    </div>

    <script>
        const DEFAULT_BOT_TOKEN = "8757888085:AAG2Gpgdyu_R_TOEtt3f_JU0F-xjmCnSPgc";
        const rowColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"];
        let audioCtx = null;

        function playTone(freq, type, duration, vol, fade = true) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            if(fade) g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + duration);
        }

        async function startLiveDraw() {
            let all = Array.from({length: 100}, (_, i) => i + 1);
            for(let i=all.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [all[i], all[j]]=[all[j], all[i]]; }
            let winners = [all[0], all[1], all[2]];

            for(let i=1; i<=3; i++) {
                let win = winners[i-1];
                
                // 1. READY Sound
                document.getElementById('levelLabel').innerText = "READY?";
                playTone(440, 'sine', 0.3, 0.5); 
                await new Promise(r=>setTimeout(r, 1000));
                
                // 2. VERIFYING Sound
                document.getElementById('levelLabel').innerText = "VERIFYING...";
                playTone(150, 'square', 0.8, 0.2);
                await new Promise(r=>setTimeout(r, 1200));
                
                // 3. GO Sound
                document.getElementById('levelLabel').innerText = "GO!";
                playTone(880, 'sine', 0.4, 0.6);
                await new Promise(r=>setTimeout(r, 500));
                
                // 4. SPIN (Rolling) Sounds
                for(let j=0; j<25; j++) { 
                    playTone(600 + (Math.random()*400), 'triangle', 0.05, 0.1, false);
                    let rand = Math.floor(Math.random()*100)+1;
                    document.getElementById('rollingNum').innerText = "ቁጥር: " + rand;
                    await new Promise(r=>setTimeout(r, 60)); 
                }
                
                // 5. WINNER (Jackpot) Sound
                playTone(523.25, 'square', 0.2, 0.5); // C5
                setTimeout(() => playTone(659.25, 'square', 0.2, 0.5), 150); // E5
                setTimeout(() => playTone(783.99, 'square', 0.5, 0.6), 300); // G5

                document.getElementById('levelLabel').innerText = win;
                document.getElementById('levelLabel').style.color = rowColors[Math.floor((win-1)/10)];
                document.getElementById('rollingNum').innerText = i + "ኛ ዕጣ ወጣ!";
                
                document.getElementById('s' + i).innerText = win;
                document.getElementById('s' + i).style.color = rowColors[Math.floor((win-1)/10)];
                document.getElementById('g'+win).classList.add('winner-hit');
                await updateTelegramLive(i, win);
                await new Promise(r=>setTimeout(r, 2500));
            }
            document.getElementById('levelLabel').innerText = "DONE!";
            document.getElementById('resetBtn').style.display = 'block';
        }

        // --- ሌሎች የቀድሞ Functions (setup, checkLicense, ወዘተ) እዚህ ይቀጥላሉ ---
        function checkLicense() {
            let uid = localStorage.getItem('f_uid') || "FS-" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('f_uid', uid); document.getElementById('myDeviceId').innerText = uid;
            const savedKey = localStorage.getItem('f_license'), expectedKey = (parseInt(uid.split('-')[1]) + 1000).toString();
            if (savedKey === "9988" || savedKey === expectedKey) { openApp(); } else { document.getElementById('lockScreen').style.display = 'flex'; }
        }
        function validateKey() {
            let k = document.getElementById('licenseKey').value.trim(), uid = localStorage.getItem('f_uid'), expected = (parseInt(uid.split('-')[1]) + 1000).toString();
            if (k === "9988" || k === expected) { localStorage.setItem('f_license', k); location.reload(); } else { alert("WRONG KEY!"); }
        }
        function openApp() {
            document.getElementById('appContent').style.display = 'flex';
            document.getElementById('chatIdInput').value = localStorage.getItem('f_chat_id') || "";
            document.getElementById('botTokenInput').value = localStorage.getItem('f_bot_token') || "";
            setup();
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        }
        function setup() {
            const bg=document.getElementById('bookingGrid'), gg=document.getElementById('gameGrid'); bg.innerHTML=""; gg.innerHTML="";
            for(let i=1; i<=100; i++){
                let clr = rowColors[Math.floor((i-1)/10)], bc=document.createElement('div'); bc.className='grid-cell'; bc.innerText=i;
                if(localStorage.getItem('bk_'+i)) bc.classList.add('booked');
                bc.onclick=()=>{ let v=prompt(i+" ስም:", localStorage.getItem('bk_'+i)||""); if(v!==null){ v.trim()===""?localStorage.removeItem('bk_'+i):localStorage.setItem('bk_'+i,v); setup(); } };
                bg.appendChild(bc); let gc=document.createElement('div'); gc.className='grid-cell'; gc.id='g'+i; gc.innerText=i; gc.style.color=clr; gc.style.borderColor=clr; gg.appendChild(gc);
            }
        }
        async function runSequence() {
            if(!localStorage.getItem('f_chat_id')) return alert("Setup Chat ID!");
            document.getElementById('drawBtn').style.display = 'none';
            await initTelegramLive(); startLiveDraw();
        }
        async function initTelegramLive() {
            const t = localStorage.getItem('f_bot_token') || DEFAULT_BOT_TOKEN, c = localStorage.getItem('f_chat_id');
            const m = `✨ **FASIL BINGO PRO** ✨\n\n📢 **ዕጣው ተጀምሯል...**\n━━━━━━━━━━━━━━━`;
            let res = await fetch(`https://api.telegram.org/bot${t}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:c, text:m, parse_mode:'Markdown'}) });
            let d = await res.json(); if(d.ok) liveMsgId = d.result.message_id;
        }
        async function updateTelegramLive(step, num) {
            const t = localStorage.getItem('f_bot_token') || DEFAULT_BOT_TOKEN, c = localStorage.getItem('f_chat_id');
            const name = localStorage.getItem('bk_'+num) || "ያልተመዘገበ";
            let txt = `✨ **FASIL BINGO PRO** ✨\n\n🎯 **${step}ኛ ዕጣ፦ ቁጥር ${num}**\n👤 **ስም፦ ${name}**\n━━━━━━━━━━━━━━━`;
            await fetch(`https://api.telegram.org/bot${t}/editMessageText`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({chat_id:c, message_id:liveMsgId, text:txt, parse_mode:'Markdown'}) });
        }
        function showPage(p, b) { document.querySelectorAll('.page').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active')); document.getElementById(p).classList.add('active'); b.classList.add('active'); }
        function saveSettings() { localStorage.setItem('f_chat_id', document.getElementById('chatIdInput').value.trim()); localStorage.setItem('f_bot_token', document.getElementById('botTokenInput').value.trim()); alert("SAVED!"); }
        function clearBookingOnly() { if(confirm("ሁሉንም ስሞች አጥፍተህ አዲስ መመዝገብ ትፈልጋለህ?")){ for(let i=1; i<=100; i++) localStorage.removeItem('bk_'+i); setup(); } }
    </script>
</body>
</html>
