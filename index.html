<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FASIL VIP - Live Edition</title>
    <style>
        :root { --gold: #bf953f; --bright-gold: #fcf6ba; --dark-gold: #8a6d29; --red: #ff3333; --blue: #007bff; }
        body { font-family: sans-serif; background: #000; color: var(--gold); text-align: center; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #statusOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100002; display: none; justify-content: center; align-items: center; font-size: 55px; font-weight: bold; color: var(--bright-gold); }

        #appContent { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .page { display: none; flex: 1; padding: 10px; overflow-y: auto; box-sizing: border-box; padding-bottom: 90px; }
        .page.active { display: flex; flex-direction: column; }

        .tabs { display: flex; background: #111; border-top: 2px solid var(--gold); position: fixed; bottom: 0; width: 100%; height: 75px; z-index: 1000; } 
        .tab-btn { flex: 1; color: #777; border: none; background: none; font-weight: bold; font-size: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tab-btn.active { color: #fff; border-top: 4px solid var(--gold); background: #1a1a1a; }

        .setup-input { width: 90%; padding: 12px; margin: 10px auto; border-radius: 8px; border: 1px solid var(--gold); background: #111; color: #fff; display: block; }
        .save-btn { background: var(--gold); color: #000; padding: 15px; width: 90%; border-radius: 12px; font-weight: bold; border: none; margin-top: 10px; }

        .live-box { background: #111; border: 1px solid var(--gold); padding: 6px; border-radius: 10px; width: 85%; align-self: center; display: flex; justify-content: center; align-items: center; color: #fff; margin-top: 40px; margin-bottom: 5px; gap: 8px; font-size: 14px; }
        .live-dot { width: 8px; height: 8px; background: red; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2.5px; background: #151515; padding: 5px; border-radius: 8px; width: 100%; margin: 5px 0; }
        .grid-cell { background: #0a0a0a; font-size: 10px; font-weight: bold; padding: 6px 0; border: 1px solid #222; border-radius: 3px; transition: all 0.1s; }
        #bookingGrid .grid-cell { color: #fff !important; font-size: 13px; border-color: #333; }
        .booked { border: 1px solid #fff !important; box-shadow: inset 0 0 5px #fff; background: #222 !important; }
        .tracking { background: #fff !important; color: #000 !important; transform: scale(1.1); box-shadow: 0 0 10px #fff; z-index: 5; }
        .winner-hit { background: var(--red) !important; color: #fff !important; box-shadow: 0 0 15px var(--red); animation: winner-pulse 0.8s infinite; z-index: 10; }
        @keyframes winner-pulse { 0% { transform: scale(1.1); } 50% { transform: scale(1.3); } 100% { transform: scale(1.1); } }

        .res-row { display: flex; justify-content: space-between; margin: 8px 0; gap: 6px; }
        .res-card { background: #0a0a0a; border: 1.5px solid var(--gold); padding: 5px; border-radius: 10px; width: 32%; }
        .res-card span { font-size: 11px; }
        .res-card b { font-size: 26px; color: #fff; display: block; }

        canvas { border: 4px solid var(--gold); border-radius: 50%; background: #050505; width: 120px; height: 120px; margin: 5px auto; box-shadow: 0 0 20px rgba(191, 149, 63, 0.4); }
        button#drawBtn { width: 95%; padding: 15px; border-radius: 15px; font-size: 19px; font-weight: bold; background: var(--gold); color: #000; border: none; margin: 5px auto; }
        .h-ball-row { display: flex; gap: 10px; margin-top: 8px; justify-content: flex-start; }
        .h-ball-wrap { text-align: center; }
        .h-ball { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 14px; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.4); }
        .h-ball-txt { font-size: 10px; color: #888; display: block; margin-top: 2px; }
    </style>
</head>
<body onload="checkAccess()">

    <div id="statusOverlay">READY</div>

    <div id="appContent">
        <div id="bookingPage" class="page">
            <h3 style="margin-top:40px;">የተመዘገቡ</h3>
            <div id="bookingGrid" class="grid-container"></div>
            <button style="color:red; border:1px solid #444; background:none; padding:10px; border-radius:10px; margin-top:15px;" onclick="clearData()">ሁሉንም አጽዳ</button>
        </div>
        
        <div id="gamePage" class="page active">
            <div class="live-box">
                <div class="live-dot"></div>
                <span style="font-weight:bold; color:red;">LIVE TRACKING</span>
                <span id="liveClock">00:00:00</span>
            </div>
            <div id="gameGrid" class="grid-container"></div>
            <div class="res-row">
                <div class="res-card"><span>1ኛ</span><b id="v1">?</b></div>
                <div class="res-card"><span>2ኛ</span><b id="v2">?</b></div>
                <div class="res-card"><span>3ኛ</span><b id="v3">?</b></div>
            </div>
            <canvas id="bingoCanvas" width="200" height="200"></canvas>
            <button id="drawBtn" onclick="runSequence()">START DRAW</button>
            <button id="resetBtn" onclick="resetGame()" style="display:none; background:#111; color:#fff; padding:14px; border-radius:15px; border:1px solid #444; width:95%; margin:5px auto; font-weight:bold;">RE-START</button>
        </div>

        <div id="historyPage" class="page"><div id="historyList"></div></div>

        <div id="setupPage" class="page">
            <h3 style="margin-top:40px;">⚙️ TELEGRAM SETUP</h3>
            <p style="font-size: 13px; color: #888;">የቴሌግራም መረጃዎችን እዚህ ይሙሉ</p>
            <input type="text" id="botTokenInput" class="setup-input" placeholder="Bot Token አስገባ">
            <input type="text" id="chatIdInput" class="setup-input" placeholder="Chat ID አስገባ">
            <button class="save-btn" onclick="saveSettings()">ሴቭ አድርግ (SAVE)</button>
        </div>

        <div class="tabs">
            <button class="tab-btn" onclick="showPage('bookingPage', this)">📋 መዝገብ</button>
            <button class="tab-btn active" onclick="showPage('gamePage', this)">🎰 ዕጣ</button>
            <button class="tab-btn" onclick="showPage('historyPage', this)">🕒 ታሪክ</button>
            <button class="tab-btn" onclick="showPage('setupPage', this)">⚙️ SETUP</button>
        </div>
    </div>

    <script>
        const rowColors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A8", "#33FFF6", "#FFD433", "#8D33FF", "#33FFAC", "#FF8333"];
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(freq, dur, vol) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.value = freq; g.gain.value = vol;
                o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
                o.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        function checkAccess() {
            document.getElementById('botTokenInput').value = localStorage.getItem('f_bot_token') || "";
            document.getElementById('chatIdInput').value = localStorage.getItem('f_chat_id') || "";
            setup();
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        }

        function saveSettings() {
            localStorage.setItem('f_bot_token', document.getElementById('botTokenInput').value.trim());
            localStorage.setItem('f_chat_id', document.getElementById('chatIdInput').value.trim());
            alert("ተቀምጧል!");
            showPage('gamePage', document.querySelectorAll('.tab-btn')[1]);
        }

        function setup() {
            const bg = document.getElementById('bookingGrid'), gg = document.getElementById('gameGrid');
            bg.innerHTML = ""; gg.innerHTML = "";
            for(let i=1; i<=100; i++) {
                let color = rowColors[Math.floor((i-1)/10)];
                let bc = document.createElement('div'); bc.className = 'grid-cell'; bc.innerText = i;
                if(localStorage.getItem('bk_'+i)) bc.classList.add('booked');
                bc.onclick = () => {
                    let v = prompt(i+" ስም:", localStorage.getItem('bk_'+i)||"");
                    if(v!==null) { if(v.trim()==="") localStorage.removeItem('bk_'+i); else localStorage.setItem('bk_'+i, v); setup(); }
                };
                bg.appendChild(bc);
                let gc = document.createElement('div'); gc.className = 'grid-cell'; gc.id = 'g'+i; gc.innerText = i; 
                gc.style.color = color; gc.style.borderColor = color;
                gg.appendChild(gc);
            }
        }

        function showPage(p, b) {
            document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
            document.getElementById(p).classList.add('active'); b.classList.add('active');
            if(p==='historyPage') loadHistory();
        }

        const cv = document.getElementById('bingoCanvas'), cx = cv.getContext('2d');
        function renderBall(val, final) {
            cx.clearRect(0,0,200,200);
            let d = final ? val : Math.floor(Math.random()*100)+1;
            let ballColor = (final && val > 0) ? rowColors[Math.floor((val-1)/10)] : '#bf953f';
            let g = cx.createRadialGradient(70,70,10,100,100,80);
            g.addColorStop(0,'#fcf6ba'); g.addColorStop(1, ballColor);
            cx.beginPath(); cx.arc(100,100,85,0,Math.PI*2); cx.fillStyle=g; cx.fill();
            cx.fillStyle="#000"; cx.font="bold 75px Arial"; cx.textAlign="center"; cx.fillText(d||"?",100,125);
        }

        async function runSequence() {
            document.getElementById('drawBtn').style.display = 'none';
            const ov = document.getElementById('statusOverlay'); ov.style.display = 'flex';
            for(let s of ["READY","VERIFYING","GO!"]) { 
                ov.innerText = s; playSfx(440, 0.5, 0.1); 
                await new Promise(r=>setTimeout(r,800)); 
            }
            ov.style.display = 'none'; startLiveDraw();
        }

        async function startLiveDraw() {
            // [ደረጃ 2] ቁጥሮቹን በደንብ መበጥበጥ (Shuffle)
            let all = []; for(let n=1; n<=100; n++) all.push(n);
            for(let i=all.length-1; i>0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [all[i], all[j]] = [all[j], all[i]];
            }
            let winners = [all[0], all[1], all[2]];

            for(let i=1; i<=3; i++) {
                let win = winners[i-1];
                for(let j=0; j<25; j++) {
                    let t = Math.floor(Math.random()*100)+1; 
                    document.getElementById('g'+t).classList.add('tracking');
                    renderBall(0, false); playSfx(1000, 0.05, 0.05); 
                    await new Promise(r=>setTimeout(r, 60));
                    document.getElementById('g'+t).classList.remove('tracking');
                }
                renderBall(win, true); playSfx(300, 0.8, 0.2); 
                document.getElementById('v'+i).innerText = win;
                document.getElementById('g'+win).classList.add('winner-hit');
                await new Promise(r=>setTimeout(r, 1500));
            }
            saveHist(winners); 
            sendToTelegram(winners); // [ደረጃ 2] ውጤቱን መላክ
            document.getElementById('resetBtn').style.display = 'block';
        }

        function sendToTelegram(w) {
            const token = localStorage.getItem('f_bot_token'), cid = localStorage.getItem('f_chat_id');
            if(!token || !cid) return;
            const n = w.map(num => localStorage.getItem('bk_'+num) || "ያልተመዘገበ");
            const msg = `🎰 **የቢንጎ ዕጣ ውጤት** 🎰\n━━━━━━━━━━━━━━\n🥇 1ኛ፡ ቁጥር 【 ${w[0]} 】- ${n[0]}\n🥈 2ኛ፡ ቁጥር 【 ${w[1]} 】- ${n[1]}\n🥉 3ኛ፡ ቁጥር 【 ${w[2]} 】- ${n[2]}\n━━━━━━━━━━━━━━`;
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }

        function resetGame() { location.reload(); }
        function saveHist(w) {
            let h = JSON.parse(localStorage.getItem('f_h')||"[]");
            h.unshift({t: new Date().toLocaleTimeString(), r: w});
            localStorage.setItem('f_h', JSON.stringify(h.slice(0,20)));
        }
        function loadHistory() {
            let h = JSON.parse(localStorage.getItem('f_h')||"[]");
            document.getElementById('historyList').innerHTML = h.map(x => {
                let balls = x.r.map((num, idx) => `<div class="h-ball-wrap"><div class="h-ball" style="background:radial-gradient(circle at 30% 30%, #fff, ${rowColors[Math.floor((num-1)/10)]})">${num}</div><span class="h-ball-txt">${idx+1}ኛ</span></div>`).join('');
                return `<div style="background:#111; border:1px solid #333; margin:10px; padding:12px; border-left:4px solid var(--gold); border-radius:10px; text-align:left;"><small style="color:#888;">🕒 ሰዓት: ${x.t}</small><div class="h-ball-row">${balls}</div></div>`;
            }).join('');
        }
        function clearData() { if(confirm("ሁሉንም አጽዳ?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
